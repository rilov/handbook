<svg viewBox="0 0 780 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="780" height="320" fill="#f8f9fa" rx="12"/>
  <text x="390" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">The Training Loop — Same in Traditional ML and Deep Learning</text>
  <defs>
    <marker id="atl" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Step 1: Forward Pass -->
  <rect x="30" y="55" width="160" height="70" rx="10" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="110" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">① Forward Pass</text>
  <text x="110" y="96" text-anchor="middle" font-size="10" fill="#1e40af">Input email flows</text>
  <text x="110" y="110" text-anchor="middle" font-size="10" fill="#1e40af">through the network</text>
  <text x="110" y="122" text-anchor="middle" font-size="9" fill="#3b82f6">→ produces prediction</text>

  <!-- Arrow 1→2 -->
  <line x1="190" y1="90" x2="228" y2="90" stroke="#666" stroke-width="2" marker-end="url(#atl)"/>

  <!-- Step 2: Compute Loss -->
  <rect x="230" y="55" width="160" height="70" rx="10" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="310" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">② Compute Loss</text>
  <text x="310" y="96" text-anchor="middle" font-size="10" fill="#78350f">Compare prediction</text>
  <text x="310" y="110" text-anchor="middle" font-size="10" fill="#78350f">to correct label</text>
  <text x="310" y="122" text-anchor="middle" font-size="9" fill="#b45309">→ how wrong are we?</text>

  <!-- Arrow 2→3 -->
  <line x1="390" y1="90" x2="428" y2="90" stroke="#666" stroke-width="2" marker-end="url(#atl)"/>

  <!-- Step 3: Backward Pass -->
  <rect x="430" y="55" width="160" height="70" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="510" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d">③ Backward Pass</text>
  <text x="510" y="96" text-anchor="middle" font-size="10" fill="#831843">Calculate which</text>
  <text x="510" y="110" text-anchor="middle" font-size="10" fill="#831843">weights caused error</text>
  <text x="510" y="122" text-anchor="middle" font-size="9" fill="#be185d">→ blame each weight</text>

  <!-- Arrow 3→4 -->
  <line x1="590" y1="90" x2="628" y2="90" stroke="#666" stroke-width="2" marker-end="url(#atl)"/>

  <!-- Step 4: Update Weights -->
  <rect x="630" y="55" width="130" height="70" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="695" y="78" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">④ Update</text>
  <text x="695" y="96" text-anchor="middle" font-size="10" fill="#047857">Adjust weights</text>
  <text x="695" y="110" text-anchor="middle" font-size="10" fill="#047857">a small step</text>
  <text x="695" y="122" text-anchor="middle" font-size="9" fill="#059669">→ reduce the loss</text>

  <!-- LOOP arrow back -->
  <path d="M 695 125 L 695 160 L 110 160 L 110 125" fill="none" stroke="#666" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#atl)"/>
  <text x="400" y="178" text-anchor="middle" font-size="11" fill="#666" font-style="italic">Repeat for every batch until loss is small enough</text>

  <!-- Illustrative loss dropping chart -->
  <rect x="80" y="195" width="620" height="100" rx="8" fill="#fff" stroke="#e5e7eb" stroke-width="1"/>
  <text x="390" y="214" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">Loss Over Training Epochs — Should Fall as Weights Improve</text>

  <!-- Fake loss curve (decreasing) -->
  <polyline points="100,280 155,265 210,250 265,237 320,228 375,221 430,216 485,213 540,211 595,210 650,209 680,208"
    fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Axes -->
  <line x1="100" y1="285" x2="685" y2="285" stroke="#999" stroke-width="1"/>
  <line x1="100" y1="220" x2="100" y2="285" stroke="#999" stroke-width="1"/>
  <text x="390" y="300" text-anchor="middle" font-size="9" fill="#888">Epochs (training rounds)</text>
  <text x="90" y="255" text-anchor="end" font-size="9" fill="#888">Loss</text>
  <text x="110" y="226" font-size="9" fill="#ef4444">high</text>
  <text x="650" y="207" font-size="9" fill="#22c55e">low ✓</text>
</svg>
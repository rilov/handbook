<svg viewBox="0 0 980 260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="980" height="260" fill="#f8f9fa" rx="12"/>
  <text x="490" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">The CNN Pipeline — From Photo to Prediction</text>

  <defs>
    <marker id="pArrow" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0,8 3.5,0 7" fill="#999"/>
    </marker>
  </defs>

  <!-- Stage 1: Photo -->
  <rect x="15" y="70" width="130" height="90" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="108" text-anchor="middle" font-size="22">🐱</text>
  <text x="80" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Photo</text>
  <text x="80" y="145" text-anchor="middle" font-size="9" fill="#1d4ed8">(grid of pixels)</text>

  <line x1="145" y1="115" x2="175" y2="115" stroke="#aaa" stroke-width="1.5" marker-end="url(#pArrow)"/>

  <!-- Stage 2: Convolution -->
  <rect x="178" y="70" width="140" height="90" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="248" y="102" text-anchor="middle" font-size="20">🔍</text>
  <text x="248" y="124" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">Convolution</text>
  <text x="248" y="139" text-anchor="middle" font-size="9" fill="#991b1b">slide small filters</text>
  <text x="248" y="151" text-anchor="middle" font-size="9" fill="#991b1b">to find patterns</text>

  <line x1="318" y1="115" x2="348" y2="115" stroke="#aaa" stroke-width="1.5" marker-end="url(#pArrow)"/>

  <!-- Stage 3: Feature Maps -->
  <rect x="351" y="70" width="140" height="90" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="421" y="102" text-anchor="middle" font-size="20">🗺️</text>
  <text x="421" y="124" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">Feature Maps</text>
  <text x="421" y="139" text-anchor="middle" font-size="9" fill="#92400e">mark where each</text>
  <text x="421" y="151" text-anchor="middle" font-size="9" fill="#92400e">pattern was found</text>

  <line x1="491" y1="115" x2="521" y2="115" stroke="#aaa" stroke-width="1.5" marker-end="url(#pArrow)"/>

  <!-- Stage 4: Pooling -->
  <rect x="524" y="70" width="130" height="90" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="589" y="102" text-anchor="middle" font-size="20">📉</text>
  <text x="589" y="124" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">Pooling</text>
  <text x="589" y="139" text-anchor="middle" font-size="9" fill="#5b21b6">shrink, keep the</text>
  <text x="589" y="151" text-anchor="middle" font-size="9" fill="#5b21b6">strongest signals</text>

  <line x1="654" y1="115" x2="684" y2="115" stroke="#aaa" stroke-width="1.5" marker-end="url(#pArrow)"/>

  <!-- Stage 5: Flatten + Dense -->
  <rect x="687" y="70" width="150" height="90" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="762" y="98" text-anchor="middle" font-size="18">📋 🧠</text>
  <text x="762" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Flatten + Dense</text>
  <text x="762" y="135" text-anchor="middle" font-size="9" fill="#065f46">unroll into a list,</text>
  <text x="762" y="147" text-anchor="middle" font-size="9" fill="#065f46">then weigh the evidence</text>

  <line x1="837" y1="115" x2="862" y2="115" stroke="#aaa" stroke-width="1.5" marker-end="url(#pArrow)"/>

  <!-- Stage 6: Output -->
  <rect x="865" y="80" width="100" height="70" rx="8" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="915" y="108" text-anchor="middle" font-size="18">✅</text>
  <text x="915" y="128" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">"Cat!"</text>
  <text x="915" y="142" text-anchor="middle" font-size="8" fill="#065f46">92% confident</text>

  <text x="490" y="230" text-anchor="middle" font-size="10" fill="#666">Each stage understands the image a little better than the one before it</text>
</svg>

<svg viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="860" height="340" fill="#f8f9fa" rx="12"/>
  <text x="430" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Why Not Just Use a Plain (Fully Connected) Network on Images?</text>

  <!-- LEFT: Fully connected -->
  <rect x="20" y="40" width="390" height="280" rx="10" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="20" y="40" width="390" height="30" rx="10" fill="#ef4444"/>
  <text x="215" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Plain Network: Fully Connected</text>

  <!-- input pixels (small grid of 6 nodes) -->
  <g id="fc-inputs">
    <circle cx="80" cy="110" r="7" fill="#fee2e2" stroke="#ef4444"/>
    <circle cx="80" cy="140" r="7" fill="#fee2e2" stroke="#ef4444"/>
    <circle cx="80" cy="170" r="7" fill="#fee2e2" stroke="#ef4444"/>
    <circle cx="80" cy="200" r="7" fill="#fee2e2" stroke="#ef4444"/>
    <circle cx="80" cy="230" r="7" fill="#fee2e2" stroke="#ef4444"/>
    <circle cx="80" cy="260" r="7" fill="#fee2e2" stroke="#ef4444"/>
  </g>
  <text x="80" y="285" text-anchor="middle" font-size="9" fill="#991b1b">every pixel</text>

  <!-- output layer nodes (3 nodes) -->
  <g id="fc-outputs">
    <circle cx="330" cy="140" r="9" fill="#fecaca" stroke="#991b1b" stroke-width="1.5"/>
    <circle cx="330" cy="185" r="9" fill="#fecaca" stroke="#991b1b" stroke-width="1.5"/>
    <circle cx="330" cy="230" r="9" fill="#fecaca" stroke="#991b1b" stroke-width="1.5"/>
  </g>
  <text x="330" y="255" text-anchor="middle" font-size="9" fill="#991b1b">next layer</text>

  <!-- every input connects to every output: dense mesh -->
  <g stroke="#f87171" stroke-width="0.6" opacity="0.7">
    <line x1="80" y1="110" x2="330" y2="140"/>
    <line x1="80" y1="110" x2="330" y2="185"/>
    <line x1="80" y1="110" x2="330" y2="230"/>
    <line x1="80" y1="140" x2="330" y2="140"/>
    <line x1="80" y1="140" x2="330" y2="185"/>
    <line x1="80" y1="140" x2="330" y2="230"/>
    <line x1="80" y1="170" x2="330" y2="140"/>
    <line x1="80" y1="170" x2="330" y2="185"/>
    <line x1="80" y1="170" x2="330" y2="230"/>
    <line x1="80" y1="200" x2="330" y2="140"/>
    <line x1="80" y1="200" x2="330" y2="185"/>
    <line x1="80" y1="200" x2="330" y2="230"/>
    <line x1="80" y1="230" x2="330" y2="140"/>
    <line x1="80" y1="230" x2="330" y2="185"/>
    <line x1="80" y1="230" x2="330" y2="230"/>
    <line x1="80" y1="260" x2="330" y2="140"/>
    <line x1="80" y1="260" x2="330" y2="185"/>
    <line x1="80" y1="260" x2="330" y2="230"/>
  </g>

  <rect x="35" y="292" width="360" height="20" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="215" y="306" text-anchor="middle" font-size="9.5" fill="#92400e">Every pixel wired to everything — huge parameter count, no sense of "nearby"</text>

  <!-- RIGHT: Convolutional -->
  <rect x="450" y="40" width="390" height="280" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="450" y="40" width="390" height="30" rx="10" fill="#3b82f6"/>
  <text x="645" y="60" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">CNN: Convolutional (Local + Shared)</text>

  <!-- image grid 5x5 small squares -->
  <g id="conv-grid">
    <!-- draw a 5x5 grid starting x=520,y=95, cell=17 -->
  </g>
  <!-- Using a loop manually since raw SVG has no loops: draw 5 rows x 5 cols -->
  <g stroke="#93c5fd" stroke-width="1" fill="#eff6ff">
    <rect x="520" y="90" width="17" height="17"/><rect x="537" y="90" width="17" height="17"/><rect x="554" y="90" width="17" height="17"/><rect x="571" y="90" width="17" height="17"/><rect x="588" y="90" width="17" height="17"/>
    <rect x="520" y="107" width="17" height="17"/><rect x="537" y="107" width="17" height="17"/><rect x="554" y="107" width="17" height="17"/><rect x="571" y="107" width="17" height="17"/><rect x="588" y="107" width="17" height="17"/>
    <rect x="520" y="124" width="17" height="17"/><rect x="537" y="124" width="17" height="17"/><rect x="554" y="124" width="17" height="17"/><rect x="571" y="124" width="17" height="17"/><rect x="588" y="124" width="17" height="17"/>
    <rect x="520" y="141" width="17" height="17"/><rect x="537" y="141" width="17" height="17"/><rect x="554" y="141" width="17" height="17"/><rect x="571" y="141" width="17" height="17"/><rect x="588" y="141" width="17" height="17"/>
    <rect x="520" y="158" width="17" height="17"/><rect x="537" y="158" width="17" height="17"/><rect x="554" y="158" width="17" height="17"/><rect x="571" y="158" width="17" height="17"/><rect x="588" y="158" width="17" height="17"/>
  </g>
  <!-- highlight one 3x3 receptive field -->
  <rect x="537" y="107" width="51" height="51" fill="none" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="562" y="182" text-anchor="middle" font-size="9" fill="#1d4ed8">receptive field (one small patch)</text>

  <!-- arrow to single output node -->
  <line x1="605" y1="132" x2="660" y2="132" stroke="#aaa" stroke-width="1.5" marker-end="url(#cArrow)"/>
  <defs>
    <marker id="cArrow" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0,8 3.5,0 7" fill="#999"/>
    </marker>
  </defs>
  <circle cx="685" cy="132" r="10" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="685" y="155" text-anchor="middle" font-size="9" fill="#1d4ed8">1 output value</text>

  <text x="645" y="200" text-anchor="middle" font-size="9" fill="#1d4ed8">Same small kernel slides to every</text>
  <text x="645" y="213" text-anchor="middle" font-size="9" fill="#1d4ed8">position — weights are reused, not repeated</text>

  <rect x="465" y="292" width="360" height="20" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="645" y="306" text-anchor="middle" font-size="9.5" fill="#1d4ed8">Only looks at nearby pixels — far fewer weights, respects neighborhoods</text>
</svg>

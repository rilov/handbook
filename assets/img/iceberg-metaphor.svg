<svg viewBox="0 0 820 480" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e40af" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1e3a8a" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="ice_top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="ice_bot" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Sky -->
  <rect width="820" height="210" fill="url(#sky)" rx="12"/>
  <!-- Sea -->
  <rect y="200" width="820" height="280" fill="url(#sea)" rx="0"/>
  <rect y="468" width="820" height="12" fill="url(#sea)" rx="12"/>

  <!-- Water surface line -->
  <path d="M0 205 Q100 195 200 205 Q300 215 420 205 Q540 195 650 205 Q750 215 820 205" fill="none" stroke="#93c5fd" stroke-width="2" opacity="0.7"/>

  <!-- Title -->
  <text x="410" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e3a8a">Apache Iceberg — What You See vs What's Really There</text>

  <!-- ABOVE WATER label -->
  <text x="30" y="100" font-size="11" fill="#1d4ed8" font-weight="bold">ABOVE WATER</text>
  <text x="30" y="114" font-size="10" fill="#3b82f6">(what analysts see)</text>

  <!-- BELOW WATER label -->
  <text x="30" y="270" font-size="11" fill="#93c5fd" font-weight="bold">BELOW WATER</text>
  <text x="30" y="284" font-size="10" fill="#bfdbfe">(hidden machinery)</text>

  <!-- Iceberg top (above water) -->
  <polygon points="370,40 450,40 490,195 330,195" fill="url(#ice_top)" stroke="#93c5fd" stroke-width="1.5" opacity="0.95"/>

  <!-- Iceberg bottom (below water) — much larger -->
  <polygon points="330,200 490,200 560,300 580,380 530,450 420,465 300,450 240,380 260,300" fill="url(#ice_bot)" stroke="#60a5fa" stroke-width="1" opacity="0.85"/>

  <!-- ABOVE WATER callouts -->
  <!-- SQL / Table name -->
  <rect x="510" y="50" width="260" height="32" rx="6" fill="#fff" stroke="#3b82f6" stroke-width="1.5" opacity="0.95"/>
  <text x="640" y="63" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8">📊 SQL Tables (what you query)</text>
  <text x="640" y="76" text-anchor="middle" font-size="9" fill="#3b82f6">SELECT * FROM orders WHERE date = today</text>
  <line x1="510" y1="66" x2="460" y2="100" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 3"/>

  <rect x="510" y="96" width="200" height="26" rx="6" fill="#fff" stroke="#3b82f6" stroke-width="1.5" opacity="0.95"/>
  <text x="610" y="109" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8">🗂 Namespace / Table Name</text>
  <text x="610" y="120" text-anchor="middle" font-size="9" fill="#3b82f6">db.schema.orders</text>
  <line x1="510" y1="109" x2="455" y2="128" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- BELOW WATER callouts (right side) -->
  <!-- metadata.json -->
  <rect x="600" y="215" width="200" height="38" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" opacity="0.95"/>
  <text x="700" y="230" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">📄 metadata.json</text>
  <text x="700" y="244" text-anchor="middle" font-size="9" fill="#3b82f6">schema, partition spec, current snapshot</text>
  <line x1="600" y1="234" x2="492" y2="240" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Snapshot -->
  <rect x="600" y="267" width="200" height="36" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" opacity="0.95"/>
  <text x="700" y="282" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">📸 Snapshots</text>
  <text x="700" y="296" text-anchor="middle" font-size="9" fill="#3b82f6">point-in-time versions for time travel</text>
  <line x1="600" y1="285" x2="518" y2="295" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Manifest List -->
  <rect x="600" y="317" width="200" height="36" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" opacity="0.95"/>
  <text x="700" y="332" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">📋 Manifest Lists</text>
  <text x="700" y="346" text-anchor="middle" font-size="9" fill="#3b82f6">index of all manifest files per snapshot</text>
  <line x1="600" y1="335" x2="536" y2="348" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Manifest Files -->
  <rect x="600" y="367" width="200" height="36" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" opacity="0.95"/>
  <text x="700" y="382" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">📂 Manifest Files</text>
  <text x="700" y="396" text-anchor="middle" font-size="9" fill="#3b82f6">file-level stats: min/max, row counts</text>
  <line x1="600" y1="385" x2="540" y2="400" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- LEFT SIDE callouts -->
  <!-- Parquet files -->
  <rect x="20" y="310" width="210" height="36" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" opacity="0.95"/>
  <text x="125" y="325" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">🗃 Parquet Data Files</text>
  <text x="125" y="339" text-anchor="middle" font-size="9" fill="#3b82f6">actual rows stored on S3 / cloud storage</text>
  <line x1="230" y1="328" x2="280" y2="368" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Delete files -->
  <rect x="20" y="360" width="210" height="36" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" opacity="0.95"/>
  <text x="125" y="375" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">🗑 Delete Files</text>
  <text x="125" y="389" text-anchor="middle" font-size="9" fill="#3b82f6">row-level deletes without rewriting data</text>
  <line x1="230" y1="378" x2="275" y2="408" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Bottom label -->
  <text x="410" y="465" text-anchor="middle" font-size="10" fill="#93c5fd" font-style="italic">The tip is tiny. The metadata machinery underneath is what makes LTAP possible.</text>
</svg>
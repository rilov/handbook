<svg viewBox="0 0 760 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="320" fill="#f8f9fa" rx="12"/>
  <text x="380" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Max Pooling — Shrinking While Keeping the Strongest Signal</text>

  <!-- input 4x4 feature map -->
  <text x="160" y="55" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">Feature Map (4x4)</text>

  <g font-size="14" text-anchor="middle" font-family="monospace">
    <!-- top-left 2x2 block (values 1,3 / 4,6) shaded purple block A -->
    <rect x="60" y="65" width="50" height="50" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/><text x="85" y="95" fill="#4c1d6b">1</text>
    <rect x="110" y="65" width="50" height="50" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/><text x="135" y="95" fill="#4c1d6b">3</text>
    <rect x="60" y="115" width="50" height="50" fill="#ddd6fe" stroke="#7c3aed" stroke-width="1.5"/><text x="85" y="145" fill="#4c1d6b">4</text>
    <rect x="110" y="115" width="50" height="50" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2.5"/><text x="135" y="145" fill="#4c1d6b" font-weight="bold">6</text>

    <!-- top-right 2x2 block (values 2,0 / 1,2) -->
    <rect x="160" y="65" width="50" height="50" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/><text x="185" y="95" fill="#991b1b">2</text>
    <rect x="210" y="65" width="50" height="50" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/><text x="235" y="95" fill="#991b1b">0</text>
    <rect x="160" y="115" width="50" height="50" fill="#fecaca" stroke="#ef4444" stroke-width="2.5"/><text x="185" y="145" fill="#991b1b" font-weight="bold">2</text>
    <rect x="210" y="115" width="50" height="50" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/><text x="235" y="145" fill="#991b1b">1</text>

    <!-- bottom-left 2x2 block (values 0,1 / 2,3) -->
    <rect x="60" y="165" width="50" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/><text x="85" y="195" fill="#92400e">0</text>
    <rect x="110" y="165" width="50" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/><text x="135" y="195" fill="#92400e">1</text>
    <rect x="60" y="215" width="50" height="50" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/><text x="85" y="245" fill="#92400e">2</text>
    <rect x="110" y="215" width="50" height="50" fill="#fde68a" stroke="#f59e0b" stroke-width="2.5"/><text x="135" y="245" fill="#92400e" font-weight="bold">3</text>

    <!-- bottom-right 2x2 block (values 8,5 / 4,7) -->
    <rect x="160" y="165" width="50" height="50" fill="#d1fae5" stroke="#059669" stroke-width="2.5"/><text x="185" y="195" fill="#065f46" font-weight="bold">8</text>
    <rect x="210" y="165" width="50" height="50" fill="#a7f3d0" stroke="#059669" stroke-width="1.5"/><text x="235" y="195" fill="#065f46">5</text>
    <rect x="160" y="215" width="50" height="50" fill="#a7f3d0" stroke="#059669" stroke-width="1.5"/><text x="185" y="245" fill="#065f46">4</text>
    <rect x="210" y="215" width="50" height="50" fill="#a7f3d0" stroke="#059669" stroke-width="1.5"/><text x="235" y="245" fill="#065f46">7</text>
  </g>
  <text x="160" y="285" text-anchor="middle" font-size="9.5" fill="#666">Bold number = the maximum in each 2x2 block</text>

  <!-- Arrow -->
  <line x1="290" y1="165" x2="360" y2="165" stroke="#aaa" stroke-width="1.5" marker-end="url(#mArrow)"/>
  <defs>
    <marker id="mArrow" markerWidth="9" markerHeight="8" refX="7" refY="4" orient="auto">
      <polygon points="0 0,9 4,0 8" fill="#999"/>
    </marker>
  </defs>
  <text x="325" y="150" text-anchor="middle" font-size="9" fill="#666">keep only</text>
  <text x="325" y="195" text-anchor="middle" font-size="9" fill="#666">the max</text>

  <!-- output 2x2 pooled map -->
  <text x="490" y="55" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Pooled Map (2x2)</text>
  <g font-size="18" text-anchor="middle" font-family="monospace" font-weight="bold">
    <rect x="430" y="65" width="70" height="70" fill="#c4b5fd" stroke="#7c3aed" stroke-width="2"/><text x="465" y="108" fill="#4c1d6b">6</text>
    <rect x="500" y="65" width="70" height="70" fill="#fecaca" stroke="#ef4444" stroke-width="2"/><text x="535" y="108" fill="#991b1b">2</text>
    <rect x="430" y="135" width="70" height="70" fill="#fde68a" stroke="#f59e0b" stroke-width="2"/><text x="465" y="178" fill="#92400e">3</text>
    <rect x="500" y="135" width="70" height="70" fill="#d1fae5" stroke="#059669" stroke-width="2"/><text x="535" y="178" fill="#065f46">8</text>
  </g>
  <text x="500" y="225" text-anchor="middle" font-size="10" fill="#666">Same information, a quarter of the size</text>

  <text x="620" y="100" text-anchor="middle" font-size="10" fill="#666" width="120">Why it helps:</text>
  <text x="620" y="120" text-anchor="middle" font-size="9" fill="#666">faster to process,</text>
  <text x="620" y="135" text-anchor="middle" font-size="9" fill="#666">forgiving of small</text>
  <text x="620" y="150" text-anchor="middle" font-size="9" fill="#666">shifts in position,</text>
  <text x="620" y="165" text-anchor="middle" font-size="9" fill="#666">less prone to</text>
  <text x="620" y="180" text-anchor="middle" font-size="9" fill="#666">memorizing exact</text>
  <text x="620" y="195" text-anchor="middle" font-size="9" fill="#666">training photos</text>
</svg>

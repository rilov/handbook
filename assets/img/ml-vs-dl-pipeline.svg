<svg viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="860" height="320" fill="#f8f9fa" rx="12"/>
  <text x="430" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Traditional ML vs Deep Learning — Same Goal, Different Path</text>

  <!-- ── LEFT: Traditional ML ── -->
  <rect x="20" y="40" width="390" height="265" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="20" y="40" width="390" height="32" rx="10" fill="#3b82f6"/>
  <text x="215" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Traditional Machine Learning</text>

  <!-- Raw email -->
  <rect x="105" y="84" width="220" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="215" y="103" text-anchor="middle" font-size="11" fill="#1d4ed8">📧 Raw Email</text>

  <!-- Arrow -->
  <line x1="215" y1="112" x2="215" y2="128" stroke="#aaa" stroke-width="1.5" marker-end="url(#a1)"/>
  <defs>
    <marker id="a1" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0,7 3,0 6" fill="#999"/>
    </marker>
  </defs>

  <!-- Human box -->
  <rect x="55" y="128" width="320" height="54" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="215" y="148" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">👨‍💼 Human Engineers Features</text>
  <text x="215" y="166" text-anchor="middle" font-size="10" fill="#78350f">suspicious words · links · sender · caps · length</text>

  <!-- Arrow -->
  <line x1="215" y1="182" x2="215" y2="198" stroke="#aaa" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Feature vector -->
  <rect x="95" y="198" width="240" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1"/>
  <text x="215" y="217" text-anchor="middle" font-size="11" fill="#1d4ed8" font-family="monospace">[3.0, 1.0, 0.0, 0.20, 47.0]</text>

  <!-- Arrow -->
  <line x1="215" y1="226" x2="215" y2="242" stroke="#aaa" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Simple model -->
  <rect x="80" y="242" width="270" height="28" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="215" y="261" text-anchor="middle" font-size="11" fill="#5b21b6">Logistic Regression / Decision Tree</text>

  <!-- Arrow -->
  <line x1="215" y1="270" x2="215" y2="286" stroke="#aaa" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Output -->
  <rect x="120" y="286" width="190" height="10" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="215" y="295" text-anchor="middle" font-size="10" fill="#065f46" font-weight="bold">Spam Probability</text>

  <!-- ── RIGHT: Deep Learning ── -->
  <rect x="450" y="40" width="390" height="265" rx="10" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="450" y="40" width="390" height="32" rx="10" fill="#ef4444"/>
  <text x="645" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">Deep Learning</text>

  <!-- Raw email -->
  <rect x="535" y="84" width="220" height="28" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="645" y="103" text-anchor="middle" font-size="11" fill="#991b1b">📧 Raw Email Text</text>

  <!-- Arrow -->
  <line x1="645" y1="112" x2="645" y2="128" stroke="#aaa" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Token+Embed box -->
  <rect x="485" y="128" width="320" height="36" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="645" y="145" text-anchor="middle" font-size="11" font-weight="bold" fill="#9d174d">🤖 Model Learns its Own Features</text>
  <text x="645" y="160" text-anchor="middle" font-size="10" fill="#831843">Tokens → Embeddings → Hidden layers</text>

  <!-- Arrow -->
  <line x1="645" y1="164" x2="645" y2="180" stroke="#aaa" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Hidden layer 1 -->
  <rect x="520" y="180" width="250" height="24" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="645" y="196" text-anchor="middle" font-size="10" fill="#5b21b6">Hidden Layer 1 — word patterns</text>

  <!-- Arrow -->
  <line x1="645" y1="204" x2="645" y2="218" stroke="#aaa" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Hidden layer 2 -->
  <rect x="520" y="218" width="250" height="24" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="645" y="234" text-anchor="middle" font-size="10" fill="#5b21b6">Hidden Layer 2 — phrase patterns</text>

  <!-- Arrow -->
  <line x1="645" y1="242" x2="645" y2="256" stroke="#aaa" stroke-width="1.5" marker-end="url(#a1)"/>

  <!-- Output layer -->
  <rect x="540" y="256" width="210" height="28" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="645" y="275" text-anchor="middle" font-size="11" fill="#92400e">Output Layer + Sigmoid</text>

  <!-- Arrow -->
  <line x1="645" y1="284" x2="645" y2="296" stroke="#aaa" stroke-width="1.5" marker-end="url(#a1)"/>

  <rect x="555" y="294" width="180" height="4" rx="2" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="645" y="303" text-anchor="middle" font-size="10" fill="#065f46" font-weight="bold">Spam Probability</text>

  <!-- KEY DIFFERENCE callout -->
  <text x="430" y="315" text-anchor="middle" font-size="10" fill="#666">Key difference: who decides what the model looks at</text>
</svg>
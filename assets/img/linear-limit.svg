<svg viewBox="0 0 760 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="300" fill="#f8f9fa" rx="12"/>
  <text x="380" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Why a Single Neuron Is Limited — It Can Only Draw a Straight Line</text>

  <!-- LEFT: Single neuron (linear) -->
  <rect x="20" y="40" width="340" height="245" rx="10" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="20" y="40" width="340" height="28" rx="10" fill="#ef4444"/>
  <text x="190" y="59" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Single Neuron — Linear Decision</text>

  <!-- Axis -->
  <line x1="60" y1="240" x2="340" y2="240" stroke="#999" stroke-width="1.5"/>
  <line x1="60" y1="240" x2="60" y2="78" stroke="#999" stroke-width="1.5"/>
  <text x="190" y="278" text-anchor="middle" font-size="10" fill="#666">Suspicious Words</text>
  <text x="30" y="160" text-anchor="middle" font-size="10" fill="#666" transform="rotate(-90 30 160)">Links</text>

  <!-- Decision boundary: a straight line -->
  <line x1="65" y1="200" x2="335" y2="90" stroke="#ef4444" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="270" y="82" font-size="10" fill="#ef4444">decision boundary</text>

  <!-- SPAM dots (red) -->
  <circle cx="230" cy="100" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="270" cy="110" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="300" cy="95" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="250" cy="130" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="310" cy="120" r="7" fill="#ef4444" opacity="0.8"/>
  <!-- NOT SPAM dots (green) -->
  <circle cx="90" cy="200" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="120" cy="210" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="100" cy="180" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="140" cy="195" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="110" cy="225" r="7" fill="#22c55e" opacity="0.8"/>
  <!-- MIXED / hard cases (can't separate with one line) -->
  <circle cx="190" cy="155" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="170" cy="145" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="200" cy="170" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="180" cy="130" r="7" fill="#ef4444" opacity="0.8"/>

  <!-- Legend -->
  <circle cx="80" cy="262" r="5" fill="#ef4444"/>
  <text x="90" y="266" font-size="10" fill="#555">Spam</text>
  <circle cx="140" cy="262" r="5" fill="#22c55e"/>
  <text x="150" y="266" font-size="10" fill="#555">Not Spam</text>
  <text x="190" y="266" font-size="9" fill="#ef4444">⚠ mixed region misclassified</text>

  <!-- RIGHT: Hidden layer (non-linear) -->
  <rect x="400" y="40" width="340" height="245" rx="10" fill="#fff" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="400" y="40" width="340" height="28" rx="10" fill="#22c55e"/>
  <text x="570" y="59" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Hidden Layer — Curved Decision</text>

  <!-- Axis -->
  <line x1="440" y1="240" x2="720" y2="240" stroke="#999" stroke-width="1.5"/>
  <line x1="440" y1="240" x2="440" y2="78" stroke="#999" stroke-width="1.5"/>
  <text x="570" y="278" text-anchor="middle" font-size="10" fill="#666">Suspicious Words</text>
  <text x="410" y="160" text-anchor="middle" font-size="10" fill="#666" transform="rotate(-90 410 160)">Links</text>

  <!-- Curved decision boundary (approximate with path) -->
  <path d="M 445 220 Q 520 180 570 150 Q 620 120 690 85" fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="650" y="78" font-size="10" fill="#22c55e">curved boundary</text>

  <!-- SPAM dots -->
  <circle cx="610" cy="100" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="650" cy="110" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="680" cy="95" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="630" cy="130" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="690" cy="120" r="7" fill="#ef4444" opacity="0.8"/>
  <!-- NOT SPAM dots -->
  <circle cx="470" cy="200" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="500" cy="210" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="480" cy="180" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="520" cy="195" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="490" cy="225" r="7" fill="#22c55e" opacity="0.8"/>
  <!-- Now correctly classified mixed cases -->
  <circle cx="570" cy="155" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="550" cy="145" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="580" cy="170" r="7" fill="#22c55e" opacity="0.8"/>
  <circle cx="560" cy="130" r="7" fill="#ef4444" opacity="0.8"/>

  <!-- Tick marks showing correct -->
  <text x="543" y="142" font-size="11" fill="#22c55e">✓</text>
  <text x="573" y="167" font-size="11" fill="#22c55e">✓</text>
  <text x="563" y="127" font-size="11" fill="#22c55e">✓</text>
  <text x="563" y="152" font-size="11" fill="#22c55e">✓</text>

  <circle cx="460" cy="262" r="5" fill="#ef4444"/>
  <text x="470" y="266" font-size="10" fill="#555">Spam</text>
  <circle cx="520" cy="262" r="5" fill="#22c55e"/>
  <text x="530" y="266" font-size="10" fill="#555">Not Spam</text>
  <text x="580" y="266" font-size="9" fill="#22c55e">✓ mixed region correctly split</text>
</svg>
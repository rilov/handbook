<svg viewBox="0 0 900 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="380" fill="#f8f9fa" rx="12"/>
  <text x="450" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">The Convolution Operation — A Worked Example</text>

  <!-- Image grid label -->
  <text x="150" y="55" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Image (5x5 pixels)</text>

  <!-- 5x5 image grid, cell=34, start x=45,y=65 -->
  <g font-size="12" text-anchor="middle">
    <!-- row 1 -->
    <rect x="45" y="65" width="34" height="34" fill="#111827"/><text x="62" y="86" fill="#fff">0</text>
    <rect x="79" y="65" width="34" height="34" fill="#111827"/><text x="96" y="86" fill="#fff">0</text>
    <rect x="113" y="65" width="34" height="34" fill="#374151"/><text x="130" y="86" fill="#fff">0</text>
    <rect x="147" y="65" width="34" height="34" fill="#e5e7eb"/><text x="164" y="86" fill="#111">1</text>
    <rect x="181" y="65" width="34" height="34" fill="#e5e7eb"/><text x="198" y="86" fill="#111">1</text>
    <!-- row 2 -->
    <rect x="45" y="99" width="34" height="34" fill="#111827"/><text x="62" y="120" fill="#fff">0</text>
    <rect x="79" y="99" width="34" height="34" fill="#111827"/><text x="96" y="120" fill="#fff">0</text>
    <rect x="113" y="99" width="34" height="34" fill="#374151"/><text x="130" y="120" fill="#fff">0</text>
    <rect x="147" y="99" width="34" height="34" fill="#e5e7eb"/><text x="164" y="120" fill="#111">1</text>
    <rect x="181" y="99" width="34" height="34" fill="#e5e7eb"/><text x="198" y="120" fill="#111">1</text>
    <!-- row 3 -->
    <rect x="45" y="133" width="34" height="34" fill="#111827"/><text x="62" y="154" fill="#fff">0</text>
    <rect x="79" y="133" width="34" height="34" fill="#111827"/><text x="96" y="154" fill="#fff">0</text>
    <rect x="113" y="133" width="34" height="34" fill="#374151"/><text x="130" y="154" fill="#fff">0</text>
    <rect x="147" y="133" width="34" height="34" fill="#e5e7eb"/><text x="164" y="154" fill="#111">1</text>
    <rect x="181" y="133" width="34" height="34" fill="#e5e7eb"/><text x="198" y="154" fill="#111">1</text>
    <!-- row 4 -->
    <rect x="45" y="167" width="34" height="34" fill="#111827"/><text x="62" y="188" fill="#fff">0</text>
    <rect x="79" y="167" width="34" height="34" fill="#111827"/><text x="96" y="188" fill="#fff">0</text>
    <rect x="113" y="167" width="34" height="34" fill="#374151"/><text x="130" y="188" fill="#fff">0</text>
    <rect x="147" y="167" width="34" height="34" fill="#e5e7eb"/><text x="164" y="188" fill="#111">1</text>
    <rect x="181" y="167" width="34" height="34" fill="#e5e7eb"/><text x="198" y="188" fill="#111">1</text>
    <!-- row 5 -->
    <rect x="45" y="201" width="34" height="34" fill="#111827"/><text x="62" y="222" fill="#fff">0</text>
    <rect x="79" y="201" width="34" height="34" fill="#111827"/><text x="96" y="222" fill="#fff">0</text>
    <rect x="113" y="201" width="34" height="34" fill="#374151"/><text x="130" y="222" fill="#fff">0</text>
    <rect x="147" y="201" width="34" height="34" fill="#e5e7eb"/><text x="164" y="222" fill="#111">1</text>
    <rect x="181" y="201" width="34" height="34" fill="#e5e7eb"/><text x="198" y="222" fill="#111">1</text>
  </g>

  <!-- highlight 3x3 receptive field: rows1-3, cols 1-3 i.e. x=79..181,y=65..167 -->
  <rect x="79" y="65" width="102" height="102" fill="none" stroke="#ef4444" stroke-width="3"/>
  <text x="130" y="248" text-anchor="middle" font-size="10" fill="#991b1b">3x3 patch being scanned right now</text>

  <!-- Kernel -->
  <text x="360" y="55" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">Filter / Kernel (3x3)</text>
  <g font-size="13" text-anchor="middle">
    <rect x="300" y="65" width="40" height="40" fill="#fee2e2" stroke="#ef4444"/><text x="320" y="90" fill="#991b1b">-1</text>
    <rect x="340" y="65" width="40" height="40" fill="#fee2e2" stroke="#ef4444"/><text x="360" y="90" fill="#991b1b">0</text>
    <rect x="380" y="65" width="40" height="40" fill="#fee2e2" stroke="#ef4444"/><text x="400" y="90" fill="#991b1b">1</text>

    <rect x="300" y="105" width="40" height="40" fill="#fee2e2" stroke="#ef4444"/><text x="320" y="130" fill="#991b1b">-1</text>
    <rect x="340" y="105" width="40" height="40" fill="#fee2e2" stroke="#ef4444"/><text x="360" y="130" fill="#991b1b">0</text>
    <rect x="380" y="105" width="40" height="40" fill="#fee2e2" stroke="#ef4444"/><text x="400" y="130" fill="#991b1b">1</text>

    <rect x="300" y="145" width="40" height="40" fill="#fee2e2" stroke="#ef4444"/><text x="320" y="170" fill="#991b1b">-1</text>
    <rect x="340" y="145" width="40" height="40" fill="#fee2e2" stroke="#ef4444"/><text x="360" y="170" fill="#991b1b">0</text>
    <rect x="380" y="145" width="40" height="40" fill="#fee2e2" stroke="#ef4444"/><text x="400" y="170" fill="#991b1b">1</text>
  </g>
  <text x="360" y="212" text-anchor="middle" font-size="10" fill="#991b1b">"dark on the left,</text>
  <text x="360" y="225" text-anchor="middle" font-size="10" fill="#991b1b">light on the right" detector</text>

  <!-- Arrow to math -->
  <line x1="440" y1="130" x2="490" y2="130" stroke="#aaa" stroke-width="1.5" marker-end="url(#kArrow)"/>
  <defs>
    <marker id="kArrow" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0,8 3.5,0 7" fill="#999"/>
    </marker>
  </defs>

  <!-- Math box -->
  <rect x="495" y="65" width="230" height="140" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="610" y="88" text-anchor="middle" font-size="11" font-weight="bold" fill="#5b21b6">multiply &amp; add up</text>
  <text x="610" y="112" text-anchor="middle" font-size="10" fill="#4c1d6b" font-family="monospace">(0x-1)+(0x0)+(1x1)</text>
  <text x="610" y="128" text-anchor="middle" font-size="10" fill="#4c1d6b" font-family="monospace">+(0x-1)+(0x0)+(1x1)</text>
  <text x="610" y="144" text-anchor="middle" font-size="10" fill="#4c1d6b" font-family="monospace">+(0x-1)+(0x0)+(1x1)</text>
  <line x1="525" y1="154" x2="695" y2="154" stroke="#7c3aed" stroke-width="1"/>
  <text x="610" y="175" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6" font-family="monospace">= 3  (strong match!)</text>

  <!-- Arrow to feature map -->
  <line x1="730" y1="130" x2="770" y2="130" stroke="#aaa" stroke-width="1.5" marker-end="url(#kArrow)"/>

  <!-- feature map single cell result -->
  <text x="835" y="55" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Feature Map</text>
  <rect x="785" y="65" width="34" height="34" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="802" y="87" text-anchor="middle" font-size="13" font-weight="bold" fill="#065f46">3</text>
  <rect x="819" y="65" width="34" height="34" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <rect x="785" y="99" width="34" height="34" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <rect x="819" y="99" width="34" height="34" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1"/>
  <text x="835" y="150" text-anchor="middle" font-size="9" fill="#065f46">one number per</text>
  <text x="835" y="163" text-anchor="middle" font-size="9" fill="#065f46">position scanned</text>

  <text x="450" y="290" text-anchor="middle" font-size="10.5" fill="#666">The kernel then slides one step over and repeats — building the full feature map, one scalar at a time</text>
  <text x="450" y="308" text-anchor="middle" font-size="10.5" fill="#666">Dark pixels = 0, light pixels = 1 in this simplified example</text>
</svg>

<svg viewBox="0 0 940 260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="940" height="260" fill="#f8f9fa" rx="12"/>
  <text x="470" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">The 1x1 Bottleneck — Shrink Channels, Do the Expensive Work Cheaply, Expand Back</text>

  <defs>
    <marker id="bArrow" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0,8 3.5,0 7" fill="#999"/>
    </marker>
  </defs>

  <!-- Input block: tall stack representing 256 channels -->
  <rect x="20" y="70" width="70" height="130" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="55" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Input</text>
  <text x="55" y="155" text-anchor="middle" font-size="10" fill="#1d4ed8">256</text>
  <text x="55" y="168" text-anchor="middle" font-size="9" fill="#1d4ed8">channels</text>

  <line x1="90" y1="135" x2="115" y2="135" stroke="#aaa" stroke-width="1.5" marker-end="url(#bArrow)"/>

  <!-- 1x1 conv reduce -->
  <rect x="118" y="80" width="90" height="60" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="163" y="102" text-anchor="middle" font-size="10" font-weight="bold" fill="#991b1b">1x1 conv</text>
  <text x="163" y="115" text-anchor="middle" font-size="9" fill="#991b1b">256 → 64</text>
  <text x="163" y="128" text-anchor="middle" font-size="8.5" fill="#991b1b">"squeeze"</text>

  <line x1="208" y1="110" x2="233" y2="110" stroke="#aaa" stroke-width="1.5" marker-end="url(#bArrow)"/>

  <!-- squeezed stack: shorter to represent 64 channels -->
  <rect x="236" y="95" width="50" height="45" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.2"/>
  <text x="261" y="112" text-anchor="middle" font-size="9" fill="#991b1b">64</text>
  <text x="261" y="124" text-anchor="middle" font-size="8" fill="#991b1b">ch.</text>

  <line x1="286" y1="117" x2="311" y2="117" stroke="#aaa" stroke-width="1.5" marker-end="url(#bArrow)"/>

  <!-- 3x3 conv on the small channel count -->
  <rect x="314" y="85" width="110" height="65" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="369" y="108" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">3x3 conv</text>
  <text x="369" y="121" text-anchor="middle" font-size="9" fill="#92400e">64 → 64</text>
  <text x="369" y="134" text-anchor="middle" font-size="8.5" fill="#92400e">the real work,</text>
  <text x="369" y="145" text-anchor="middle" font-size="8.5" fill="#92400e">done cheaply</text>

  <line x1="424" y1="117" x2="449" y2="117" stroke="#aaa" stroke-width="1.5" marker-end="url(#bArrow)"/>

  <rect x="452" y="95" width="50" height="45" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="477" y="112" text-anchor="middle" font-size="9" fill="#92400e">64</text>
  <text x="477" y="124" text-anchor="middle" font-size="8" fill="#92400e">ch.</text>

  <line x1="502" y1="117" x2="527" y2="117" stroke="#aaa" stroke-width="1.5" marker-end="url(#bArrow)"/>

  <!-- 1x1 conv expand -->
  <rect x="530" y="80" width="90" height="60" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="575" y="102" text-anchor="middle" font-size="10" font-weight="bold" fill="#5b21b6">1x1 conv</text>
  <text x="575" y="115" text-anchor="middle" font-size="9" fill="#5b21b6">64 → 256</text>
  <text x="575" y="128" text-anchor="middle" font-size="8.5" fill="#5b21b6">"expand"</text>

  <line x1="620" y1="110" x2="645" y2="110" stroke="#aaa" stroke-width="1.5" marker-end="url(#bArrow)"/>

  <!-- Output block: tall stack again -->
  <rect x="648" y="70" width="70" height="130" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="683" y="140" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Output</text>
  <text x="683" y="155" text-anchor="middle" font-size="10" fill="#065f46">256</text>
  <text x="683" y="168" text-anchor="middle" font-size="9" fill="#065f46">channels</text>

  <!-- Callout comparing cost -->
  <rect x="740" y="70" width="180" height="130" rx="8" fill="#fff" stroke="#9ca3af" stroke-width="1.3"/>
  <text x="830" y="90" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">Without bottleneck</text>
  <text x="830" y="105" text-anchor="middle" font-size="8.5" fill="#374151" font-family="monospace">3x3, 256→256</text>
  <text x="830" y="118" text-anchor="middle" font-size="8.5" fill="#374151" font-family="monospace">≈590,000 weights</text>
  <line x1="755" y1="128" x2="905" y2="128" stroke="#e5e7eb" stroke-width="1"/>
  <text x="830" y="145" text-anchor="middle" font-size="10" font-weight="bold" fill="#374151">With bottleneck</text>
  <text x="830" y="160" text-anchor="middle" font-size="8.5" fill="#374151" font-family="monospace">1x1+3x3+1x1</text>
  <text x="830" y="173" text-anchor="middle" font-size="8.5" fill="#374151" font-family="monospace">≈70,000 weights</text>
  <text x="830" y="189" text-anchor="middle" font-size="8" fill="#059669" font-weight="bold">far cheaper, same shape</text>

  <text x="470" y="225" text-anchor="middle" font-size="10" fill="#666">Shrinking channels before the expensive 3x3 convolution keeps expressive power while cutting parameters dramatically</text>
</svg>

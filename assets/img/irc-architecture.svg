<svg viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="360" fill="#f8f9fa" rx="12"/>
  <text x="410" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">IRC — Iceberg REST Catalog: The Universal "Phone Book" for Tables</text>

  <defs>
    <marker id="airc" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0,7 3,0 6" fill="#7c3aed"/>
    </marker>
    <marker id="airc2" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0,7 3,0 6" fill="#059669"/>
    </marker>
  </defs>

  <!-- ── ENGINES (left) ── -->
  <text x="90" y="52" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">Query Engines</text>

  <rect x="20" y="60" width="140" height="32" rx="7" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="90" y="81" text-anchor="middle" font-size="11" fill="#92400e">⚡ Apache Spark</text>

  <rect x="20" y="104" width="140" height="32" rx="7" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="90" y="125" text-anchor="middle" font-size="11" fill="#5b21b6">🔺 Trino / Presto</text>

  <rect x="20" y="148" width="140" height="32" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="169" text-anchor="middle" font-size="11" fill="#1d4ed8">🦆 DuckDB</text>

  <rect x="20" y="192" width="140" height="32" rx="7" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="90" y="213" text-anchor="middle" font-size="11" fill="#065f46">🌊 Apache Flink</text>

  <rect x="20" y="236" width="140" height="32" rx="7" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="90" y="257" text-anchor="middle" font-size="11" fill="#9d174d">❄️ Snowflake</text>

  <!-- Arrows to IRC -->
  <line x1="160" y1="76" x2="272" y2="148" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#airc)"/>
  <line x1="160" y1="120" x2="272" y2="158" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#airc)"/>
  <line x1="160" y1="164" x2="272" y2="168" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#airc)"/>
  <line x1="160" y1="208" x2="272" y2="178" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#airc)"/>
  <line x1="160" y1="252" x2="272" y2="188" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#airc)"/>
  <text x="220" y="132" text-anchor="middle" font-size="9" fill="#7c3aed" transform="rotate(-14 220 132)">HTTP REST calls</text>

  <!-- ── IRC BOX (centre) ── -->
  <rect x="274" y="60" width="270" height="230" rx="12" fill="#fff" stroke="#7c3aed" stroke-width="2.5"/>
  <rect x="274" y="60" width="270" height="36" rx="12" fill="#7c3aed"/>
  <text x="409" y="79" text-anchor="middle" font-size="13" font-weight="bold" fill="#fff">IRC — Iceberg REST Catalog</text>
  <text x="409" y="93" text-anchor="middle" font-size="9" fill="#c4b5fd">(e.g. Apache Polaris, Nessie, Gravitino)</text>

  <!-- REST API endpoints -->
  <text x="290" y="118" font-size="10" font-weight="bold" fill="#5b21b6">REST API Endpoints:</text>

  <rect x="288" y="124" width="242" height="20" rx="4" fill="#f5f3ff"/>
  <text x="296" y="138" font-size="9" fill="#6d28d9" font-family="monospace">GET  /v1/namespaces</text>
  <text x="510" y="138" text-anchor="end" font-size="9" fill="#9ca3af">list schemas</text>

  <rect x="288" y="148" width="242" height="20" rx="4" fill="#f5f3ff"/>
  <text x="296" y="162" font-size="9" fill="#6d28d9" font-family="monospace">GET  /v1/namespaces/{ns}/tables</text>

  <rect x="288" y="172" width="242" height="20" rx="4" fill="#f5f3ff"/>
  <text x="296" y="186" font-size="9" fill="#6d28d9" font-family="monospace">GET  /v1/.../tables/{table}</text>
  <text x="510" y="186" text-anchor="end" font-size="9" fill="#9ca3af">→ metadata path</text>

  <rect x="288" y="196" width="242" height="20" rx="4" fill="#f5f3ff"/>
  <text x="296" y="210" font-size="9" fill="#6d28d9" font-family="monospace">POST /v1/.../tables/{table}/metrics</text>

  <rect x="288" y="220" width="242" height="20" rx="4" fill="#f5f3ff"/>
  <text x="296" y="234" font-size="9" fill="#6d28d9" font-family="monospace">POST /v1/transactions/commit</text>
  <text x="510" y="234" text-anchor="end" font-size="9" fill="#9ca3af">ACID commit</text>

  <!-- What it stores -->
  <rect x="288" y="248" width="242" height="36" rx="4" fill="#faf5ff" stroke="#ddd6fe" stroke-width="1"/>
  <text x="409" y="263" text-anchor="middle" font-size="10" font-weight="bold" fill="#5b21b6">Stores:</text>
  <text x="409" y="278" text-anchor="middle" font-size="9" fill="#6d28d9">table name → metadata.json S3 path</text>

  <!-- Arrows to Storage -->
  <line x1="544" y1="168" x2="598" y2="168" stroke="#059669" stroke-width="2" marker-end="url(#airc2)"/>
  <text x="571" y="160" text-anchor="middle" font-size="9" fill="#059669">returns</text>
  <text x="571" y="172" text-anchor="middle" font-size="9" fill="#059669">metadata</text>
  <text x="571" y="184" text-anchor="middle" font-size="9" fill="#059669">location</text>

  <!-- ── STORAGE (right) ── -->
  <text x="710" y="52" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">Object Storage</text>

  <!-- metadata.json -->
  <rect x="600" y="60" width="200" height="50" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="700" y="80" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">📄 metadata.json</text>
  <text x="700" y="96" text-anchor="middle" font-size="9" fill="#047857">schema · partition · snapshots</text>
  <text x="700" y="107" text-anchor="middle" font-size="8" fill="#6b7280">s3://bucket/table/metadata/v3.json</text>

  <!-- Manifests -->
  <rect x="600" y="122" width="200" height="40" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="700" y="138" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">📋 Manifest Lists</text>
  <text x="700" y="153" text-anchor="middle" font-size="9" fill="#047857">snap-xxx.avro (per snapshot)</text>

  <!-- Manifest files -->
  <rect x="600" y="174" width="200" height="40" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="700" y="190" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">📂 Manifest Files</text>
  <text x="700" y="205" text-anchor="middle" font-size="9" fill="#047857">file paths · stats · partition info</text>

  <!-- Data files -->
  <rect x="600" y="226" width="200" height="52" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="700" y="245" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">🗃 Parquet Data Files</text>
  <text x="700" y="260" text-anchor="middle" font-size="9" fill="#047857">part-00001.parquet</text>
  <text x="700" y="273" text-anchor="middle" font-size="9" fill="#047857">part-00002.parquet ...</text>

  <!-- Connecting lines within storage -->
  <line x1="700" y1="110" x2="700" y2="122" stroke="#059669" stroke-width="1.5"/>
  <line x1="700" y1="162" x2="700" y2="174" stroke="#059669" stroke-width="1.5"/>
  <line x1="700" y1="214" x2="700" y2="226" stroke="#059669" stroke-width="1.5"/>

  <!-- Engine reads metadata directly (after catalog gives location) -->
  <path d="M 160 164 Q 200 310 598 270" fill="none" stroke="#059669" stroke-width="1.5" stroke-dasharray="6 3" marker-end="url(#airc2)"/>
  <text x="355" y="326" text-anchor="middle" font-size="9" fill="#059669" font-style="italic">engine reads metadata files directly from S3 (not via catalog)</text>

  <!-- Key insight box -->
  <rect x="20" y="300" width="548" height="48" rx="8" fill="#faf5ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="294" y="318" text-anchor="middle" font-size="10" font-weight="bold" fill="#5b21b6">💡 Key Insight</text>
  <text x="294" y="333" text-anchor="middle" font-size="10" fill="#6d28d9">The catalog only tells engines WHERE the metadata is. Engines then read it themselves.</text>
  <text x="294" y="345" text-anchor="middle" font-size="9" fill="#7c3aed">This means: any engine that speaks REST can read any Iceberg table — Spark, Trino, DuckDB, Snowflake.</text>
</svg>
<svg viewBox="0 0 980 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="980" height="320" fill="#f8f9fa" rx="12"/>
  <text x="490" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">VGG16 Architecture — 13 Conv Layers + 3 Dense Layers = 16 Weight Layers</text>

  <defs>
    <marker id="vArrow" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0,7 3,0 6" fill="#999"/>
    </marker>
  </defs>

  <!-- Input -->
  <rect x="10" y="120" width="66" height="80" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="43" y="150" text-anchor="middle" font-size="9" font-weight="bold" fill="#1d4ed8">Input</text>
  <text x="43" y="164" text-anchor="middle" font-size="8" fill="#1d4ed8">224x224</text>
  <text x="43" y="176" text-anchor="middle" font-size="8" fill="#1d4ed8">x3</text>

  <line x1="76" y1="160" x2="98" y2="160" stroke="#aaa" stroke-width="1.3" marker-end="url(#vArrow)"/>

  <!-- Block 1 -->
  <rect x="101" y="110" width="80" height="100" rx="6" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="141" y="130" text-anchor="middle" font-size="9" font-weight="bold" fill="#991b1b">Block 1</text>
  <text x="141" y="145" text-anchor="middle" font-size="8" fill="#991b1b">2x Conv-64</text>
  <text x="141" y="157" text-anchor="middle" font-size="8" fill="#991b1b">3x3</text>
  <text x="141" y="172" text-anchor="middle" font-size="8" fill="#991b1b">MaxPool</text>
  <text x="141" y="225" text-anchor="middle" font-size="7.5" fill="#666">→112x112x64</text>

  <line x1="181" y1="160" x2="203" y2="160" stroke="#aaa" stroke-width="1.3" marker-end="url(#vArrow)"/>

  <!-- Block 2 -->
  <rect x="206" y="115" width="80" height="90" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="246" y="133" text-anchor="middle" font-size="9" font-weight="bold" fill="#92400e">Block 2</text>
  <text x="246" y="147" text-anchor="middle" font-size="8" fill="#92400e">2x Conv-128</text>
  <text x="246" y="159" text-anchor="middle" font-size="8" fill="#92400e">3x3</text>
  <text x="246" y="173" text-anchor="middle" font-size="8" fill="#92400e">MaxPool</text>
  <text x="246" y="225" text-anchor="middle" font-size="7.5" fill="#666">→56x56x128</text>

  <line x1="286" y1="160" x2="308" y2="160" stroke="#aaa" stroke-width="1.3" marker-end="url(#vArrow)"/>

  <!-- Block 3 -->
  <rect x="311" y="120" width="80" height="80" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="351" y="137" text-anchor="middle" font-size="9" font-weight="bold" fill="#5b21b6">Block 3</text>
  <text x="351" y="150" text-anchor="middle" font-size="8" fill="#5b21b6">3x Conv-256</text>
  <text x="351" y="162" text-anchor="middle" font-size="8" fill="#5b21b6">3x3</text>
  <text x="351" y="176" text-anchor="middle" font-size="8" fill="#5b21b6">MaxPool</text>
  <text x="351" y="225" text-anchor="middle" font-size="7.5" fill="#666">→28x28x256</text>

  <line x1="391" y1="160" x2="413" y2="160" stroke="#aaa" stroke-width="1.3" marker-end="url(#vArrow)"/>

  <!-- Block 4 -->
  <rect x="416" y="125" width="80" height="70" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="456" y="141" text-anchor="middle" font-size="9" font-weight="bold" fill="#065f46">Block 4</text>
  <text x="456" y="153" text-anchor="middle" font-size="8" fill="#065f46">3x Conv-512</text>
  <text x="456" y="165" text-anchor="middle" font-size="8" fill="#065f46">3x3</text>
  <text x="456" y="177" text-anchor="middle" font-size="8" fill="#065f46">MaxPool</text>
  <text x="456" y="225" text-anchor="middle" font-size="7.5" fill="#666">→14x14x512</text>

  <line x1="496" y1="160" x2="518" y2="160" stroke="#aaa" stroke-width="1.3" marker-end="url(#vArrow)"/>

  <!-- Block 5 -->
  <rect x="521" y="130" width="80" height="60" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="561" y="145" text-anchor="middle" font-size="9" font-weight="bold" fill="#1d4ed8">Block 5</text>
  <text x="561" y="157" text-anchor="middle" font-size="8" fill="#1d4ed8">3x Conv-512</text>
  <text x="561" y="169" text-anchor="middle" font-size="8" fill="#1d4ed8">+ MaxPool</text>
  <text x="561" y="225" text-anchor="middle" font-size="7.5" fill="#666">→7x7x512</text>

  <line x1="601" y1="160" x2="623" y2="160" stroke="#aaa" stroke-width="1.3" marker-end="url(#vArrow)"/>

  <!-- Flatten -->
  <rect x="626" y="140" width="60" height="40" rx="6" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="656" y="157" text-anchor="middle" font-size="8" font-weight="bold" fill="#374151">Flatten</text>
  <text x="656" y="169" text-anchor="middle" font-size="7.5" fill="#374151">25,088</text>

  <line x1="686" y1="160" x2="708" y2="160" stroke="#aaa" stroke-width="1.3" marker-end="url(#vArrow)"/>

  <!-- Dense layers -->
  <rect x="711" y="120" width="70" height="80" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="746" y="145" text-anchor="middle" font-size="9" font-weight="bold" fill="#9d174d">Dense</text>
  <text x="746" y="160" text-anchor="middle" font-size="9" fill="#9d174d">4,096</text>

  <line x1="781" y1="160" x2="800" y2="160" stroke="#aaa" stroke-width="1.3" marker-end="url(#vArrow)"/>

  <rect x="803" y="120" width="70" height="80" rx="6" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="838" y="145" text-anchor="middle" font-size="9" font-weight="bold" fill="#9d174d">Dense</text>
  <text x="838" y="160" text-anchor="middle" font-size="9" fill="#9d174d">4,096</text>

  <line x1="873" y1="160" x2="892" y2="160" stroke="#aaa" stroke-width="1.3" marker-end="url(#vArrow)"/>

  <rect x="895" y="115" width="75" height="90" rx="6" fill="#fff" stroke="#059669" stroke-width="2"/>
  <text x="932" y="140" text-anchor="middle" font-size="9" font-weight="bold" fill="#065f46">Output</text>
  <text x="932" y="153" text-anchor="middle" font-size="8" fill="#065f46">1,000</text>
  <text x="932" y="165" text-anchor="middle" font-size="8" fill="#065f46">+ Softmax</text>

  <text x="490" y="260" text-anchor="middle" font-size="10" fill="#666">Spatial size shrinks block by block (224 → 112 → 56 → 28 → 14 → 7); channel depth grows (64 → 128 → 256 → 512)</text>
  <text x="490" y="278" text-anchor="middle" font-size="10" fill="#666">The three Dense layers hold ~90% of all 138 million parameters, despite being only 3 of the 16 weight layers</text>
</svg>

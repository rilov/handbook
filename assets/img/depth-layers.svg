<svg viewBox="0 0 800 260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="800" height="260" fill="#f8f9fa" rx="12"/>
  <text x="400" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Each Layer Builds on the Previous — From Simple to Complex</text>

  <defs>
    <marker id="adl" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#888"/>
    </marker>
  </defs>

  <!-- Email input -->
  <rect x="20" y="80" width="100" height="110" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="70" y="100" text-anchor="middle" font-size="12">📧</text>
  <text x="70" y="116" text-anchor="middle" font-size="10" fill="#78350f" font-weight="bold">Raw Email</text>
  <text x="70" y="130" text-anchor="middle" font-size="9" fill="#92400e">"Claim your</text>
  <text x="70" y="143" text-anchor="middle" font-size="9" fill="#92400e">FREE prize</text>
  <text x="70" y="156" text-anchor="middle" font-size="9" fill="#92400e">NOW!! →link"</text>
  <text x="70" y="172" text-anchor="middle" font-size="9" fill="#b45309">tokens: IDs</text>

  <!-- Arrow 1 -->
  <line x1="120" y1="135" x2="148" y2="135" stroke="#888" stroke-width="2" marker-end="url(#adl)"/>

  <!-- Layer 1 -->
  <rect x="150" y="60" width="130" height="150" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="215" y="80" text-anchor="middle" font-size="10" font-weight="bold" fill="#1d4ed8">Layer 1</text>
  <text x="215" y="96" text-anchor="middle" font-size="9" fill="#1e40af">Individual words</text>
  <rect x="165" y="104" width="100" height="20" rx="4" fill="#bfdbfe"/>
  <text x="215" y="118" text-anchor="middle" font-size="9" fill="#1d4ed8">"claim" → spam?</text>
  <rect x="165" y="130" width="100" height="20" rx="4" fill="#bfdbfe"/>
  <text x="215" y="144" text-anchor="middle" font-size="9" fill="#1d4ed8">"free" → spam?</text>
  <rect x="165" y="156" width="100" height="20" rx="4" fill="#bfdbfe"/>
  <text x="215" y="170" text-anchor="middle" font-size="9" fill="#1d4ed8">"NOW" → spam?</text>
  <rect x="165" y="182" width="100" height="20" rx="4" fill="#bfdbfe"/>
  <text x="215" y="196" text-anchor="middle" font-size="9" fill="#1d4ed8">"prize" → spam?</text>

  <!-- Arrow 2 -->
  <line x1="280" y1="135" x2="308" y2="135" stroke="#888" stroke-width="2" marker-end="url(#adl)"/>

  <!-- Layer 2 -->
  <rect x="310" y="60" width="150" height="150" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="385" y="80" text-anchor="middle" font-size="10" font-weight="bold" fill="#5b21b6">Layer 2</text>
  <text x="385" y="96" text-anchor="middle" font-size="9" fill="#6d28d9">Word combinations</text>
  <rect x="325" y="104" width="120" height="20" rx="4" fill="#ddd6fe"/>
  <text x="385" y="118" text-anchor="middle" font-size="9" fill="#5b21b6">"claim your" → ⚠</text>
  <rect x="325" y="130" width="120" height="20" rx="4" fill="#ddd6fe"/>
  <text x="385" y="144" text-anchor="middle" font-size="9" fill="#5b21b6">"free prize" → ⚠</text>
  <rect x="325" y="156" width="120" height="20" rx="4" fill="#ddd6fe"/>
  <text x="385" y="170" text-anchor="middle" font-size="9" fill="#5b21b6">"click here" → ⚠</text>
  <rect x="325" y="182" width="120" height="20" rx="4" fill="#ddd6fe"/>
  <text x="385" y="196" text-anchor="middle" font-size="9" fill="#5b21b6">"NOW!!" → ⚠</text>

  <!-- Arrow 3 -->
  <line x1="460" y1="135" x2="488" y2="135" stroke="#888" stroke-width="2" marker-end="url(#adl)"/>

  <!-- Layer 3 -->
  <rect x="490" y="60" width="160" height="150" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="570" y="80" text-anchor="middle" font-size="10" font-weight="bold" fill="#9d174d">Layer 3</text>
  <text x="570" y="96" text-anchor="middle" font-size="9" fill="#be185d">Phrase intent</text>
  <rect x="505" y="104" width="130" height="20" rx="4" fill="#fbcfe8"/>
  <text x="570" y="118" text-anchor="middle" font-size="9" fill="#9d174d">"claim your free prize"</text>
  <rect x="505" y="130" width="130" height="20" rx="4" fill="#fbcfe8"/>
  <text x="570" y="144" text-anchor="middle" font-size="9" fill="#9d174d">urgency pattern 🚨</text>
  <rect x="505" y="156" width="130" height="20" rx="4" fill="#fbcfe8"/>
  <text x="570" y="170" text-anchor="middle" font-size="9" fill="#9d174d">link + reward combo</text>
  <rect x="505" y="182" width="130" height="20" rx="4" fill="#fbcfe8"/>
  <text x="570" y="196" text-anchor="middle" font-size="9" fill="#9d174d">aggressive caps</text>

  <!-- Arrow 4 -->
  <line x1="650" y1="135" x2="678" y2="135" stroke="#888" stroke-width="2" marker-end="url(#adl)"/>

  <!-- Output -->
  <rect x="680" y="95" width="100" height="80" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2.5"/>
  <text x="730" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#065f46">Output</text>
  <text x="730" y="133" text-anchor="middle" font-size="20">🚨</text>
  <text x="730" y="153" text-anchor="middle" font-size="13" fill="#065f46" font-weight="bold">SPAM</text>
  <text x="730" y="167" text-anchor="middle" font-size="11" fill="#047857">94.6%</text>

  <!-- Bottom labels -->
  <text x="70" y="235" text-anchor="middle" font-size="9" fill="#888">raw text</text>
  <text x="215" y="235" text-anchor="middle" font-size="9" fill="#1d4ed8">simple signals</text>
  <text x="385" y="235" text-anchor="middle" font-size="9" fill="#5b21b6">combinations</text>
  <text x="570" y="235" text-anchor="middle" font-size="9" fill="#9d174d">rich patterns</text>
  <text x="730" y="235" text-anchor="middle" font-size="9" fill="#065f46">decision</text>

  <text x="400" y="252" text-anchor="middle" font-size="10" fill="#666">Like reading: letters → words → sentences → meaning</text>
</svg>
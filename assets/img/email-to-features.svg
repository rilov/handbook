<svg viewBox="0 0 820 240" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="820" height="240" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="410" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Converting an Email into Numbers (Feature Vector)</text>

  <!-- EMAIL BOX -->
  <rect x="30" y="50" width="200" height="150" rx="8" fill="#fff" stroke="#4a90d9" stroke-width="2"/>
  <rect x="30" y="50" width="200" height="30" rx="8" fill="#4a90d9"/>
  <text x="130" y="71" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">📧 Email</text>
  <text x="130" y="100" text-anchor="middle" font-size="11" fill="#555">Congratulations!</text>
  <text x="130" y="116" text-anchor="middle" font-size="11" fill="#555">Click HERE to WIN</text>
  <text x="130" y="132" text-anchor="middle" font-size="11" fill="#555">FREE MONEY NOW!!!</text>
  <text x="130" y="148" text-anchor="middle" font-size="11" fill="#555">→ link1  → link2</text>
  <text x="130" y="164" text-anchor="middle" font-size="10" fill="#999">From: unknown@spam.net</text>
  <text x="130" y="180" text-anchor="middle" font-size="10" fill="#999">Words: 47 | Caps: 20%</text>

  <!-- Arrow -->
  <line x1="235" y1="125" x2="295" y2="125" stroke="#666" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="265" y="117" text-anchor="middle" font-size="10" fill="#888">extract</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- FEATURES BOX -->
  <rect x="300" y="50" width="210" height="150" rx="8" fill="#fff" stroke="#e8a020" stroke-width="2"/>
  <rect x="300" y="50" width="210" height="30" rx="8" fill="#e8a020"/>
  <text x="405" y="71" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Features</text>
  <text x="315" y="100" font-size="11" fill="#555">Suspicious words:</text><text x="500" y="100" text-anchor="end" font-size="11" fill="#c0392b" font-weight="bold">3</text>
  <text x="315" y="118" font-size="11" fill="#555">Links:</text><text x="500" y="118" text-anchor="end" font-size="11" fill="#c0392b" font-weight="bold">1</text>
  <text x="315" y="136" font-size="11" fill="#555">Known sender:</text><text x="500" y="136" text-anchor="end" font-size="11" fill="#c0392b" font-weight="bold">no</text>
  <text x="315" y="154" font-size="11" fill="#555">Capital letters:</text><text x="500" y="154" text-anchor="end" font-size="11" fill="#c0392b" font-weight="bold">20%</text>
  <text x="315" y="172" font-size="11" fill="#555">Length:</text><text x="500" y="172" text-anchor="end" font-size="11" fill="#c0392b" font-weight="bold">47 words</text>

  <!-- Arrow -->
  <line x1="515" y1="125" x2="575" y2="125" stroke="#666" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="545" y="117" text-anchor="middle" font-size="10" fill="#888">encode</text>

  <!-- TENSOR BOX -->
  <rect x="580" y="50" width="210" height="150" rx="8" fill="#fff" stroke="#27ae60" stroke-width="2"/>
  <rect x="580" y="50" width="210" height="30" rx="8" fill="#27ae60"/>
  <text x="685" y="71" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Tensor (Numbers)</text>
  <text x="685" y="105" text-anchor="middle" font-size="13" fill="#333" font-family="monospace">[</text>
  <text x="685" y="123" text-anchor="middle" font-size="12" fill="#1a6ebd" font-family="monospace">3.0,  1.0,</text>
  <text x="685" y="141" text-anchor="middle" font-size="12" fill="#1a6ebd" font-family="monospace">0.0,  0.20,</text>
  <text x="685" y="159" text-anchor="middle" font-size="12" fill="#1a6ebd" font-family="monospace">47.0</text>
  <text x="685" y="177" text-anchor="middle" font-size="13" fill="#333" font-family="monospace">]</text>
</svg>
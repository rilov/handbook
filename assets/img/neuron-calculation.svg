<svg viewBox="0 0 820 320" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="820" height="320" fill="#f8f9fa" rx="12"/>
  <text x="410" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Inside the Neuron: Weighted Sum + Bias</text>
  <defs>
    <marker id="ar2" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#666"/>
    </marker>
  </defs>

  <!-- Inputs + weights -->
  <!-- Row labels -->
  <!-- x1 -->
  <rect x="20" y="52" width="130" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="85" y="67" text-anchor="middle" font-size="10" fill="#1d4ed8">Suspicious words</text>
  <text x="85" y="82" text-anchor="middle" font-size="12" fill="#1d4ed8" font-weight="bold">x₁ = 3.0</text>
  <!-- x2 -->
  <rect x="20" y="100" width="130" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="85" y="115" text-anchor="middle" font-size="10" fill="#1d4ed8">Links</text>
  <text x="85" y="130" text-anchor="middle" font-size="12" fill="#1d4ed8" font-weight="bold">x₂ = 1.0</text>
  <!-- x3 -->
  <rect x="20" y="148" width="130" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="85" y="163" text-anchor="middle" font-size="10" fill="#1d4ed8">Known sender</text>
  <text x="85" y="178" text-anchor="middle" font-size="12" fill="#1d4ed8" font-weight="bold">x₃ = 0.0</text>
  <!-- x4 -->
  <rect x="20" y="196" width="130" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="85" y="211" text-anchor="middle" font-size="10" fill="#1d4ed8">Capitals</text>
  <text x="85" y="226" text-anchor="middle" font-size="12" fill="#1d4ed8" font-weight="bold">x₄ = 0.20</text>
  <!-- x5 -->
  <rect x="20" y="244" width="130" height="36" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="85" y="259" text-anchor="middle" font-size="10" fill="#1d4ed8">Length</text>
  <text x="85" y="274" text-anchor="middle" font-size="12" fill="#1d4ed8" font-weight="bold">x₅ = 47.0</text>

  <!-- Weight labels on lines -->
  <line x1="150" y1="70" x2="340" y2="150" stroke="#f59e0b" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="230" y="95" font-size="10" fill="#b45309" font-weight="bold">w₁ = 0.8</text>
  <line x1="150" y1="118" x2="340" y2="152" stroke="#f59e0b" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="220" y="128" font-size="10" fill="#b45309" font-weight="bold">w₂ = 0.6</text>
  <line x1="150" y1="166" x2="340" y2="160" stroke="#f59e0b" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="210" y="158" font-size="10" fill="#b45309" font-weight="bold">w₃ = −1.2</text>
  <line x1="150" y1="214" x2="340" y2="168" stroke="#f59e0b" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="210" y="198" font-size="10" fill="#b45309" font-weight="bold">w₄ = 2.0</text>
  <line x1="150" y1="262" x2="340" y2="172" stroke="#f59e0b" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="215" y="234" font-size="10" fill="#b45309" font-weight="bold">w₅ = 0.01</text>

  <!-- Bias -->
  <rect x="20" y="292" width="130" height="22" rx="6" fill="#fde8d8" stroke="#ea6b1a" stroke-width="1.5"/>
  <text x="85" y="307" text-anchor="middle" font-size="11" fill="#c0510a" font-weight="bold">bias b = −1.0</text>
  <line x1="150" y1="303" x2="340" y2="185" stroke="#ea6b1a" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#ar2)"/>

  <!-- Summation circle -->
  <circle cx="370" cy="162" r="38" fill="#fff" stroke="#6d28d9" stroke-width="2.5"/>
  <text x="370" y="155" text-anchor="middle" font-size="22" fill="#6d28d9">Σ</text>
  <text x="370" y="174" text-anchor="middle" font-size="9" fill="#6d28d9">sum</text>

  <!-- Arrow → raw score -->
  <line x1="408" y1="162" x2="460" y2="162" stroke="#666" stroke-width="2" marker-end="url(#ar2)"/>

  <!-- Raw score box -->
  <rect x="465" y="140" width="130" height="44" rx="8" fill="#f3e8ff" stroke="#6d28d9" stroke-width="2"/>
  <text x="530" y="158" text-anchor="middle" font-size="11" fill="#5b21b6">Raw Score z</text>
  <text x="530" y="177" text-anchor="middle" font-size="14" fill="#5b21b6" font-weight="bold">z = 2.87</text>

  <!-- Arrow → sigmoid -->
  <line x1="595" y1="162" x2="645" y2="162" stroke="#666" stroke-width="2" marker-end="url(#ar2)"/>
  <text x="620" y="154" text-anchor="middle" font-size="10" fill="#888">sigmoid</text>

  <!-- Probability -->
  <rect x="650" y="140" width="150" height="44" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="725" y="158" text-anchor="middle" font-size="11" fill="#065f46">Spam Probability</text>
  <text x="725" y="177" text-anchor="middle" font-size="14" fill="#065f46" font-weight="bold">0.946 → Spam</text>

  <!-- Calculation breakdown -->
  <rect x="465" y="210" width="340" height="90" rx="8" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="635" y="228" text-anchor="middle" font-size="10" fill="#555" font-weight="bold">Calculation Detail</text>
  <text x="475" y="245" font-size="10" fill="#555">(3 × 0.8) + (1 × 0.6) + (0 × −1.2) + (0.2 × 2.0)</text>
  <text x="475" y="261" font-size="10" fill="#555">+ (47 × 0.01) + (−1.0)</text>
  <text x="475" y="278" font-size="10" fill="#555">= 2.40 + 0.60 + 0.00 + 0.40 + 0.47 − 1.00</text>
  <text x="475" y="294" font-size="11" fill="#5b21b6" font-weight="bold">= 2.87</text>
</svg>
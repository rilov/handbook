<svg viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="860" height="340" fill="#f8f9fa" rx="12"/>
  <text x="430" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">The Degradation Problem — Why Stacking More Layers Can Backfire</text>

  <!-- LEFT panel: Plain network -->
  <rect x="20" y="45" width="390" height="255" rx="10" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="20" y="45" width="390" height="28" rx="10" fill="#ef4444"/>
  <text x="215" y="64" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Plain Network (no shortcuts)</text>

  <!-- axes -->
  <line x1="70" y1="260" x2="70" y2="90" stroke="#999" stroke-width="1.3"/>
  <line x1="70" y1="260" x2="370" y2="260" stroke="#999" stroke-width="1.3"/>
  <text x="40" y="95" font-size="9" fill="#666">high</text>
  <text x="40" y="262" font-size="9" fill="#666">low</text>
  <text x="215" y="278" text-anchor="middle" font-size="9" fill="#666">training iterations →</text>
  <text x="30" y="180" text-anchor="middle" font-size="9" fill="#666" transform="rotate(-90 30 180)">training error</text>

  <!-- 20-layer line (starts high error, improves to a good low error) -->
  <polyline points="70,100 120,150 170,180 220,200 270,212 320,218 370,220" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- 56-layer line (starts high, improves less — degradation, plateaus worse/higher) -->
  <polyline points="70,110 120,165 170,185 220,192 270,194 320,193 370,194" fill="none" stroke="#f59e0b" stroke-width="2.5"/>

  <circle cx="370" cy="220" r="3.5" fill="#3b82f6"/>
  <circle cx="370" cy="194" r="3.5" fill="#f59e0b"/>

  <rect x="90" y="95" width="12" height="3" fill="#3b82f6"/>
  <text x="107" y="99" font-size="9" fill="#1d4ed8">20-layer plain net</text>
  <rect x="90" y="110" width="12" height="3" fill="#f59e0b"/>
  <text x="107" y="114" font-size="9" fill="#92400e">56-layer plain net (worse!)</text>

  <rect x="35" y="270" width="360" height="22" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="215" y="285" text-anchor="middle" font-size="9" fill="#92400e">Adding layers made training error go UP — this isn't overfitting, it's degradation</text>

  <!-- RIGHT panel: Residual network -->
  <rect x="450" y="45" width="390" height="255" rx="10" fill="#fff" stroke="#3b82f6" stroke-width="1.5"/>
  <rect x="450" y="45" width="390" height="28" rx="10" fill="#3b82f6"/>
  <text x="645" y="64" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Residual Network (with shortcuts)</text>

  <line x1="500" y1="260" x2="500" y2="90" stroke="#999" stroke-width="1.3"/>
  <line x1="500" y1="260" x2="800" y2="260" stroke="#999" stroke-width="1.3"/>
  <text x="470" y="95" font-size="9" fill="#666">high</text>
  <text x="470" y="262" font-size="9" fill="#666">low</text>
  <text x="645" y="278" text-anchor="middle" font-size="9" fill="#666">training iterations →</text>
  <text x="460" y="180" text-anchor="middle" font-size="9" fill="#666" transform="rotate(-90 460 180)">training error</text>

  <!-- 20-layer resnet -->
  <polyline points="500,100 550,150 600,180 650,200 700,212 750,218 800,222" fill="none" stroke="#3b82f6" stroke-width="2.5"/>
  <!-- 56-layer resnet (now BETTER, ends up at a lower error) -->
  <polyline points="500,105 550,155 600,192 650,215 700,230 750,238 800,242" fill="none" stroke="#059669" stroke-width="2.5"/>

  <circle cx="800" cy="222" r="3.5" fill="#3b82f6"/>
  <circle cx="800" cy="242" r="3.5" fill="#059669"/>

  <rect x="520" y="95" width="12" height="3" fill="#3b82f6"/>
  <text x="537" y="99" font-size="9" fill="#1d4ed8">20-layer ResNet</text>
  <rect x="520" y="110" width="12" height="3" fill="#059669"/>
  <text x="537" y="114" font-size="9" fill="#065f46">56-layer ResNet (better!)</text>

  <rect x="465" y="270" width="360" height="22" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="645" y="285" text-anchor="middle" font-size="9" fill="#065f46">With shortcut connections, deeper now reliably means better</text>

  <text x="430" y="322" text-anchor="middle" font-size="10" fill="#666">Simplified illustration of the pattern reported in the original ResNet paper (He et al., 2015)</text>
</svg>

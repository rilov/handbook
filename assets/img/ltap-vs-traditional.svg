<svg viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="860" height="340" fill="#f8f9fa" rx="12"/>
  <text x="430" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">LTAP: Unifying Transactions and Analytics on the Same Lake</text>

  <defs>
    <marker id="atv" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0,7 3,0 6" fill="#94a3b8"/>
    </marker>
    <marker id="atv2" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0,7 3,0 6" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- ── LEFT: OLD WORLD ── -->
  <rect x="20" y="40" width="360" height="275" rx="10" fill="#fff" stroke="#ef4444" stroke-width="1.5"/>
  <rect x="20" y="40" width="360" height="30" rx="10" fill="#ef4444"/>
  <text x="200" y="61" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Before Iceberg — Two Separate Worlds</text>

  <!-- Transactional box -->
  <rect x="40" y="82" width="145" height="110" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="112" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#991b1b">Transactional</text>
  <text x="112" y="115" text-anchor="middle" font-size="9" fill="#7f1d1d">(OLTP)</text>
  <text x="112" y="133" text-anchor="middle" font-size="10" fill="#b91c1c">✏️ INSERT</text>
  <text x="112" y="149" text-anchor="middle" font-size="10" fill="#b91c1c">✏️ UPDATE</text>
  <text x="112" y="165" text-anchor="middle" font-size="10" fill="#b91c1c">✏️ DELETE</text>
  <text x="112" y="183" text-anchor="middle" font-size="9" fill="#dc2626">PostgreSQL / MySQL</text>

  <!-- Wall of separation -->
  <line x1="200" y1="82" x2="200" y2="285" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="200" y="232" text-anchor="middle" font-size="24" fill="#94a3b8">🚧</text>
  <text x="200" y="250" text-anchor="middle" font-size="9" fill="#94a3b8">ETL pipelines</text>
  <text x="200" y="262" text-anchor="middle" font-size="9" fill="#94a3b8">hours of delay</text>
  <text x="200" y="274" text-anchor="middle" font-size="9" fill="#94a3b8">data duplication</text>

  <!-- Analytical box -->
  <rect x="215" y="82" width="145" height="110" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="287" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#1e40af">Analytical</text>
  <text x="287" y="115" text-anchor="middle" font-size="9" fill="#1e3a8a">(OLAP)</text>
  <text x="287" y="133" text-anchor="middle" font-size="10" fill="#2563eb">🔍 SELECT</text>
  <text x="287" y="149" text-anchor="middle" font-size="10" fill="#2563eb">📊 Aggregations</text>
  <text x="287" y="165" text-anchor="middle" font-size="10" fill="#2563eb">📈 Reporting</text>
  <text x="287" y="183" text-anchor="middle" font-size="9" fill="#1d4ed8">Snowflake / Redshift</text>

  <!-- Problems -->
  <rect x="40" y="205" width="320" height="98" rx="6" fill="#fff7f7" stroke="#fca5a5" stroke-width="1"/>
  <text x="200" y="222" text-anchor="middle" font-size="10" font-weight="bold" fill="#dc2626">❌ Problems</text>
  <text x="50" y="240" font-size="10" fill="#7f1d1d">• Analytics are hours/days stale (ETL lag)</text>
  <text x="50" y="256" font-size="10" fill="#7f1d1d">• Data duplicated across two expensive systems</text>
  <text x="50" y="272" font-size="10" fill="#7f1d1d">• No single source of truth</text>
  <text x="50" y="288" font-size="10" fill="#7f1d1d">• Complex pipelines that break silently</text>

  <!-- ── RIGHT: LTAP / Iceberg ── -->
  <rect x="460" y="40" width="380" height="275" rx="10" fill="#fff" stroke="#22c55e" stroke-width="2"/>
  <rect x="460" y="40" width="380" height="30" rx="10" fill="#22c55e"/>
  <text x="650" y="61" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">LTAP on Apache Iceberg — One Lakehouse</text>

  <!-- Single Iceberg table in centre -->
  <ellipse cx="650" cy="168" rx="100" ry="55" fill="#d1fae5" stroke="#059669" stroke-width="2.5"/>
  <text x="650" y="155" text-anchor="middle" font-size="12" font-weight="bold" fill="#065f46">Apache Iceberg</text>
  <text x="650" y="170" text-anchor="middle" font-size="10" fill="#047857">ACID · Snapshots</text>
  <text x="650" y="183" text-anchor="middle" font-size="10" fill="#047857">One table, one truth</text>

  <!-- Transactional ops -->
  <rect x="468" y="82" width="120" height="80" rx="7" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="528" y="100" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">Transactional</text>
  <text x="528" y="116" text-anchor="middle" font-size="9" fill="#78350f">✏️ INSERT</text>
  <text x="528" y="130" text-anchor="middle" font-size="9" fill="#78350f">✏️ UPDATE / DELETE</text>
  <text x="528" y="144" text-anchor="middle" font-size="9" fill="#78350f">✏️ MERGE / UPSERT</text>
  <line x1="548" y1="162" x2="565" y2="148" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#atv2)"/>

  <!-- Analytical ops -->
  <rect x="720" y="82" width="110" height="80" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="775" y="100" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">Analytical</text>
  <text x="775" y="116" text-anchor="middle" font-size="9" fill="#1e3a8a">🔍 SELECT</text>
  <text x="775" y="130" text-anchor="middle" font-size="9" fill="#1e3a8a">📊 Aggregations</text>
  <text x="775" y="144" text-anchor="middle" font-size="9" fill="#1e3a8a">⏱ Time Travel</text>
  <line x1="735" y1="162" x2="722" y2="148" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#atv2)"/>

  <!-- Engines below -->
  <rect x="468" y="240" width="100" height="26" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="518" y="257" text-anchor="middle" font-size="10" fill="#5b21b6">⚡ Spark</text>
  <line x1="560" y1="228" x2="545" y2="240" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3 2"/>

  <rect x="590" y="240" width="100" height="26" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="640" y="257" text-anchor="middle" font-size="10" fill="#5b21b6">🔺 Trino</text>
  <line x1="648" y1="223" x2="640" y2="240" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3 2"/>

  <rect x="712" y="240" width="120" height="26" rx="6" fill="#ede9fe" stroke="#7c3aed" stroke-width="1"/>
  <text x="772" y="257" text-anchor="middle" font-size="10" fill="#5b21b6">🦆 DuckDB / Flink</text>
  <line x1="740" y1="228" x2="750" y2="240" stroke="#7c3aed" stroke-width="1" stroke-dasharray="3 2"/>

  <!-- Benefits -->
  <rect x="468" y="278" width="362" height="28" rx="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1"/>
  <text x="649" y="296" text-anchor="middle" font-size="10" fill="#166534">✅ Real-time reads alongside writes · No ETL lag · One copy of data · ACID guaranteed</text>
</svg>
<svg viewBox="0 0 840 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="840" height="380" fill="#f8f9fa" rx="12"/>
  <text x="420" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#1e293b">LTAP in Action: How a Query Travels Through the Iceberg Stack</text>
  <text x="420" y="42" text-anchor="middle" font-size="10" fill="#64748b">From SELECT statement to Parquet rows — every step traced</text>
  <defs>
    <marker id="alf" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Step circles across the top -->
  <!-- Step 1 -->
  <circle cx="80" cy="90" r="28" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2"/>
  <text x="80" y="86" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">Step</text>
  <text x="80" y="100" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">1</text>

  <rect x="20" y="128" width="120" height="60" rx="7" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="80" y="147" text-anchor="middle" font-size="10" font-weight="bold" fill="#1e40af">SQL Query</text>
  <text x="80" y="162" text-anchor="middle" font-size="9" fill="#1d4ed8">SELECT * FROM</text>
  <text x="80" y="175" text-anchor="middle" font-size="9" fill="#1d4ed8">orders</text>

  <!-- Step 2 -->
  <line x1="140" y1="90" x2="195" y2="90" stroke="#64748b" stroke-width="2" marker-end="url(#alf)"/>
  <circle cx="230" cy="90" r="28" fill="#7c3aed" stroke="#5b21b6" stroke-width="2"/>
  <text x="230" y="86" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">Step</text>
  <text x="230" y="100" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">2</text>

  <rect x="168" y="128" width="124" height="70" rx="7" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="230" y="147" text-anchor="middle" font-size="10" font-weight="bold" fill="#5b21b6">Ask IRC</text>
  <text x="230" y="162" text-anchor="middle" font-size="9" fill="#6d28d9">GET /tables/orders</text>
  <text x="230" y="176" text-anchor="middle" font-size="9" fill="#6d28d9">→ returns S3 path</text>
  <text x="230" y="190" text-anchor="middle" font-size="8" fill="#7c3aed">s3://…/metadata/v3.json</text>

  <!-- Step 3 -->
  <line x1="292" y1="90" x2="345" y2="90" stroke="#64748b" stroke-width="2" marker-end="url(#alf)"/>
  <circle cx="380" cy="90" r="28" fill="#f59e0b" stroke="#b45309" stroke-width="2"/>
  <text x="380" y="86" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">Step</text>
  <text x="380" y="100" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">3</text>

  <rect x="318" y="128" width="124" height="70" rx="7" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="380" y="147" text-anchor="middle" font-size="10" font-weight="bold" fill="#92400e">Read Metadata</text>
  <text x="380" y="162" text-anchor="middle" font-size="9" fill="#78350f">Fetch metadata.json</text>
  <text x="380" y="176" text-anchor="middle" font-size="9" fill="#78350f">→ schema + current</text>
  <text x="380" y="190" text-anchor="middle" font-size="9" fill="#78350f">   snapshot ID</text>

  <!-- Step 4 -->
  <line x1="442" y1="90" x2="495" y2="90" stroke="#64748b" stroke-width="2" marker-end="url(#alf)"/>
  <circle cx="530" cy="90" r="28" fill="#db2777" stroke="#9d174d" stroke-width="2"/>
  <text x="530" y="86" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">Step</text>
  <text x="530" y="100" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">4</text>

  <rect x="468" y="128" width="124" height="80" rx="7" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="530" y="147" text-anchor="middle" font-size="10" font-weight="bold" fill="#9d174d">Prune Files</text>
  <text x="530" y="162" text-anchor="middle" font-size="9" fill="#831843">Read manifest list</text>
  <text x="530" y="176" text-anchor="middle" font-size="9" fill="#831843">→ read manifests</text>
  <text x="530" y="190" text-anchor="middle" font-size="9" fill="#831843">→ skip files that</text>
  <text x="530" y="204" text-anchor="middle" font-size="9" fill="#831843">   don't match</text>

  <!-- Step 5 -->
  <line x1="592" y1="90" x2="645" y2="90" stroke="#64748b" stroke-width="2" marker-end="url(#alf)"/>
  <circle cx="680" cy="90" r="28" fill="#059669" stroke="#047857" stroke-width="2"/>
  <text x="680" y="86" text-anchor="middle" font-size="10" fill="#fff" font-weight="bold">Step</text>
  <text x="680" y="100" text-anchor="middle" font-size="16" fill="#fff" font-weight="bold">5</text>

  <rect x="618" y="128" width="124" height="70" rx="7" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="680" y="147" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">Read Data</text>
  <text x="680" y="162" text-anchor="middle" font-size="9" fill="#047857">Fetch only matching</text>
  <text x="680" y="176" text-anchor="middle" font-size="9" fill="#047857">Parquet files</text>
  <text x="680" y="190" text-anchor="middle" font-size="9" fill="#047857">→ return rows</text>

  <!-- Result -->
  <line x1="742" y1="90" x2="790" y2="90" stroke="#64748b" stroke-width="2" marker-end="url(#alf)"/>
  <rect x="792" y="62" width="35" height="56" rx="5" fill="#f0fdf4" stroke="#22c55e" stroke-width="2"/>
  <text x="809" y="88" text-anchor="middle" font-size="18">✅</text>
  <text x="809" y="108" text-anchor="middle" font-size="8" fill="#166534">rows</text>

  <!-- What each step costs -->
  <rect x="20" y="240" width="800" height="120" rx="10" fill="#fff" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="420" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="#374151">Why This Is Fast — File Pruning in Action</text>

  <!-- Bar chart showing files scanned -->
  <!-- Traditional (no Iceberg): scans everything -->
  <text x="40" y="282" font-size="10" fill="#ef4444" font-weight="bold">Traditional (no Iceberg)</text>
  <rect x="220" y="272" width="590" height="16" rx="3" fill="#fca5a5"/>
  <text x="815" y="284" font-size="9" fill="#dc2626">10,000 files scanned 😰</text>

  <!-- Iceberg: pruned -->
  <text x="40" y="308" font-size="10" fill="#059669" font-weight="bold">Apache Iceberg (LTAP)</text>
  <rect x="220" y="298" width="60" height="16" rx="3" fill="#059669"/>
  <rect x="280" y="298" width="530" height="16" rx="3" fill="#d1fae5" stroke="#86efac" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="815" y="310" font-size="9" fill="#059669">60 files ✅ (99% skipped!)</text>

  <text x="40" y="344" font-size="10" fill="#64748b">How? Manifest files store each file's min/max values. If your WHERE clause is</text>
  <text x="40" y="358" font-size="10" fill="#64748b">date = '2024-06-01' and a file's max date is '2024-05-31', that file is skipped entirely — no I/O.</text>
</svg>
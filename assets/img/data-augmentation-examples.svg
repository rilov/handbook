<svg viewBox="0 0 940 260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="940" height="260" fill="#f8f9fa" rx="12"/>
  <text x="470" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Data Augmentation — One Photo Becomes Many Training Examples</text>

  <!-- Original -->
  <rect x="20" y="55" width="120" height="120" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="80" y="120" text-anchor="middle" font-size="34">🐱</text>
  <text x="80" y="190" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#1d4ed8">Original photo</text>

  <line x1="145" y1="115" x2="175" y2="115" stroke="#aaa" stroke-width="1.5" marker-end="url(#dArrow)"/>
  <defs>
    <marker id="dArrow" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0,8 3.5,0 7" fill="#999"/>
    </marker>
  </defs>

  <!-- Flip -->
  <rect x="185" y="55" width="120" height="120" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="245" y="120" text-anchor="middle" font-size="34" transform="scale(-1,1) translate(-490,0)">🐱</text>
  <text x="245" y="190" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#991b1b">Horizontal flip</text>

  <!-- Rotate -->
  <rect x="325" y="55" width="120" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="385" y="120" text-anchor="middle" font-size="34" transform="rotate(15 385 115)">🐱</text>
  <text x="385" y="190" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#92400e">Small rotation</text>

  <!-- Crop/zoom -->
  <rect x="465" y="55" width="120" height="120" rx="8" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="525" y="125" text-anchor="middle" font-size="46">🐱</text>
  <text x="525" y="190" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#5b21b6">Random crop / zoom</text>

  <!-- Color jitter -->
  <rect x="605" y="55" width="120" height="120" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="665" y="120" text-anchor="middle" font-size="34" fill="#065f46" opacity="0.7">🐱</text>
  <text x="665" y="190" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#065f46">Color / brightness shift</text>

  <!-- Noise -->
  <rect x="745" y="55" width="120" height="120" rx="8" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.5"/>
  <text x="805" y="120" text-anchor="middle" font-size="34">🐱</text>
  <g opacity="0.5">
    <circle cx="770" cy="80" r="1.3" fill="#374151"/><circle cx="790" cy="70" r="1.3" fill="#374151"/><circle cx="820" cy="95" r="1.3" fill="#374151"/>
    <circle cx="840" cy="75" r="1.3" fill="#374151"/><circle cx="775" cy="140" r="1.3" fill="#374151"/><circle cx="815" cy="150" r="1.3" fill="#374151"/>
    <circle cx="845" cy="130" r="1.3" fill="#374151"/><circle cx="760" cy="110" r="1.3" fill="#374151"/>
  </g>
  <text x="805" y="190" text-anchor="middle" font-size="10.5" font-weight="bold" fill="#374151">Added noise</text>

  <rect x="35" y="200" width="870" height="40" rx="8" fill="#fff" stroke="#9ca3af" stroke-width="1.2"/>
  <text x="470" y="218" text-anchor="middle" font-size="10.5" fill="#374151">Same label ("cat") for every version — the model sees far more variety without collecting a single new photo,</text>
  <text x="470" y="233" text-anchor="middle" font-size="10.5" fill="#374151">which reduces overfitting and makes the model more robust to how real-world photos actually vary</text>
</svg>

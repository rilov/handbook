<svg viewBox="0 0 760 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="340" fill="#f8f9fa" rx="12"/>
  <text x="380" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">Neural Network Architecture: Input → Hidden Layer → Output</text>
  <defs>
    <marker id="ar3" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0, 6 2.5, 0 5" fill="#aaa"/>
    </marker>
  </defs>

  <!-- Layer labels -->
  <text x="130" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">Input Layer</text>
  <text x="130" y="70" text-anchor="middle" font-size="10" fill="#666">(5 features)</text>
  <text x="380" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#7c3aed">Hidden Layer</text>
  <text x="380" y="70" text-anchor="middle" font-size="10" fill="#666">(3 neurons + ReLU)</text>
  <text x="630" y="55" text-anchor="middle" font-size="12" font-weight="bold" fill="#059669">Output Layer</text>
  <text x="630" y="70" text-anchor="middle" font-size="10" fill="#666">(1 neuron + Sigmoid)</text>

  <!-- Input neurons -->
  <circle cx="130" cy="105" r="26" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="130" y="100" text-anchor="middle" font-size="9" fill="#1d4ed8">susp.</text>
  <text x="130" y="113" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="bold">3.0</text>

  <circle cx="130" cy="165" r="26" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="130" y="160" text-anchor="middle" font-size="9" fill="#1d4ed8">links</text>
  <text x="130" y="173" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="bold">1.0</text>

  <circle cx="130" cy="225" r="26" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="130" y="220" text-anchor="middle" font-size="9" fill="#1d4ed8">sender</text>
  <text x="130" y="233" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="bold">0.0</text>

  <circle cx="130" cy="265" r="26" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="130" y="260" text-anchor="middle" font-size="9" fill="#1d4ed8">caps</text>
  <text x="130" y="273" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="bold">0.20</text>

  <circle cx="130" cy="305" r="26" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="130" y="300" text-anchor="middle" font-size="9" fill="#1d4ed8">length</text>
  <text x="130" y="313" text-anchor="middle" font-size="10" fill="#1d4ed8" font-weight="bold">47.0</text>

  <!-- Hidden neurons -->
  <circle cx="380" cy="145" r="32" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="380" y="138" text-anchor="middle" font-size="9" fill="#5b21b6">detect</text>
  <text x="380" y="150" text-anchor="middle" font-size="9" fill="#5b21b6">links+</text>
  <text x="380" y="162" text-anchor="middle" font-size="9" fill="#5b21b6">unknown</text>

  <circle cx="380" cy="225" r="32" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="380" y="218" text-anchor="middle" font-size="9" fill="#5b21b6">detect</text>
  <text x="380" y="230" text-anchor="middle" font-size="9" fill="#5b21b6">caps+</text>
  <text x="380" y="242" text-anchor="middle" font-size="9" fill="#5b21b6">susp. words</text>

  <circle cx="380" cy="305" r="32" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="380" y="298" text-anchor="middle" font-size="9" fill="#5b21b6">detect</text>
  <text x="380" y="310" text-anchor="middle" font-size="9" fill="#5b21b6">normal</text>
  <text x="380" y="322" text-anchor="middle" font-size="9" fill="#5b21b6">message</text>

  <!-- Output neuron -->
  <circle cx="630" cy="225" r="36" fill="#d1fae5" stroke="#059669" stroke-width="2.5"/>
  <text x="630" y="215" text-anchor="middle" font-size="10" fill="#065f46">Spam?</text>
  <text x="630" y="230" text-anchor="middle" font-size="14" fill="#065f46" font-weight="bold">0.946</text>
  <text x="630" y="245" text-anchor="middle" font-size="10" fill="#065f46">→ Spam</text>

  <!-- Connections input→hidden (draw all 5x3=15 lines) -->
  <!-- From each input to each hidden -->
  <!-- Using light gray lines -->
  <!-- input cy values: 105,165,225,265,305 -->
  <!-- hidden cy values: 145,225,305 -->
  <!-- input right edge x=156, hidden left edge x=348 -->
  <!-- Just draw all connections as thin lines -->
  <g stroke="#cbd5e1" stroke-width="1" opacity="0.8">
    <!-- to h1(145) -->
    <line x1="155" y1="105" x2="348" y2="145"/>
    <line x1="155" y1="165" x2="348" y2="145"/>
    <line x1="155" y1="225" x2="348" y2="145"/>
    <line x1="155" y1="265" x2="348" y2="145"/>
    <line x1="155" y1="305" x2="348" y2="145"/>
    <!-- to h2(225) -->
    <line x1="155" y1="105" x2="348" y2="225"/>
    <line x1="155" y1="165" x2="348" y2="225"/>
    <line x1="155" y1="225" x2="348" y2="225"/>
    <line x1="155" y1="265" x2="348" y2="225"/>
    <line x1="155" y1="305" x2="348" y2="225"/>
    <!-- to h3(305) -->
    <line x1="155" y1="105" x2="348" y2="305"/>
    <line x1="155" y1="165" x2="348" y2="305"/>
    <line x1="155" y1="225" x2="348" y2="305"/>
    <line x1="155" y1="265" x2="348" y2="305"/>
    <line x1="155" y1="305" x2="348" y2="305"/>
  </g>

  <!-- Connections hidden→output -->
  <g stroke="#a7f3d0" stroke-width="1.5">
    <line x1="412" y1="145" x2="594" y2="225"/>
    <line x1="412" y1="225" x2="594" y2="225"/>
    <line x1="412" y1="305" x2="594" y2="225"/>
  </g>

  <!-- ReLU annotation -->
  <rect x="335" y="88" width="90" height="22" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="380" y="103" text-anchor="middle" font-size="10" fill="#92400e">ReLU activation</text>

  <!-- Sigmoid annotation -->
  <rect x="580" y="162" width="100" height="22" rx="5" fill="#d1fae5" stroke="#059669" stroke-width="1"/>
  <text x="630" y="177" text-anchor="middle" font-size="10" fill="#065f46">Sigmoid → prob.</text>

  <!-- Weight labels -->
  <text x="255" y="118" text-anchor="middle" font-size="9" fill="#b45309">learned weights</text>
  <text x="510" y="170" text-anchor="middle" font-size="9" fill="#065f46">learned weights</text>
</svg>
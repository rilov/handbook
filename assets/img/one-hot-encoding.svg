<svg viewBox="0 0 760 220" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="220" fill="#f8f9fa" rx="12"/>
  <text x="380" y="28" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">One-Hot Encoding — Only One Switch On at a Time</text>

  <!-- Personal -->
  <rect x="60" y="50" width="180" height="140" rx="10" fill="#fff" stroke="#bbb" stroke-width="1.5"/>
  <text x="150" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Personal</text>
  <!-- switch ON -->
  <rect x="100" y="90" width="100" height="32" rx="16" fill="#27ae60"/>
  <circle cx="180" cy="106" r="13" fill="#fff" stroke="#1a8a4a" stroke-width="1.5"/>
  <text x="150" y="111" text-anchor="middle" font-size="10" fill="#fff">ON</text>
  <!-- switches OFF -->
  <rect x="100" y="132" width="100" height="26" rx="13" fill="#ddd"/>
  <circle cx="112" cy="145" r="11" fill="#fff" stroke="#bbb" stroke-width="1.5"/>
  <rect x="100" y="166" width="100" height="26" rx="13" fill="#ddd"/>
  <circle cx="112" cy="179" r="11" fill="#fff" stroke="#bbb" stroke-width="1.5"/>
  <text x="150" y="205" text-anchor="middle" font-size="12" fill="#27ae60" font-family="monospace" font-weight="bold">[1, 0, 0]</text>

  <!-- Business -->
  <rect x="290" y="50" width="180" height="140" rx="10" fill="#fff" stroke="#bbb" stroke-width="1.5"/>
  <text x="380" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Business</text>
  <rect x="330" y="90" width="100" height="26" rx="13" fill="#ddd"/>
  <circle cx="342" cy="103" r="11" fill="#fff" stroke="#bbb" stroke-width="1.5"/>
  <!-- switch ON -->
  <rect x="330" y="124" width="100" height="32" rx="16" fill="#e8a020"/>
  <circle cx="410" cy="140" r="13" fill="#fff" stroke="#b57d10" stroke-width="1.5"/>
  <text x="380" y="145" text-anchor="middle" font-size="10" fill="#fff">ON</text>
  <rect x="330" y="164" width="100" height="26" rx="13" fill="#ddd"/>
  <circle cx="342" cy="177" r="11" fill="#fff" stroke="#bbb" stroke-width="1.5"/>
  <text x="380" y="205" text-anchor="middle" font-size="12" fill="#e8a020" font-family="monospace" font-weight="bold">[0, 1, 0]</text>

  <!-- Unknown -->
  <rect x="520" y="50" width="180" height="140" rx="10" fill="#fff" stroke="#bbb" stroke-width="1.5"/>
  <text x="610" y="76" text-anchor="middle" font-size="13" font-weight="bold" fill="#2c3e50">Unknown</text>
  <rect x="560" y="90" width="100" height="26" rx="13" fill="#ddd"/>
  <circle cx="572" cy="103" r="11" fill="#fff" stroke="#bbb" stroke-width="1.5"/>
  <rect x="560" y="124" width="100" height="26" rx="13" fill="#ddd"/>
  <circle cx="572" cy="137" r="11" fill="#fff" stroke="#bbb" stroke-width="1.5"/>
  <!-- switch ON -->
  <rect x="560" y="158" width="100" height="32" rx="16" fill="#c0392b"/>
  <circle cx="640" cy="174" r="13" fill="#fff" stroke="#922b21" stroke-width="1.5"/>
  <text x="610" y="179" text-anchor="middle" font-size="10" fill="#fff">ON</text>
  <text x="610" y="205" text-anchor="middle" font-size="12" fill="#c0392b" font-family="monospace" font-weight="bold">[0, 0, 1]</text>
</svg>
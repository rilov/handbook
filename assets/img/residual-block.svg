<svg viewBox="0 0 760 380" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="760" height="380" fill="#f8f9fa" rx="12"/>
  <text x="380" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">The Residual Block — a Shortcut Around the Learned Layers</text>

  <defs>
    <marker id="rArrow" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0,8 3.5,0 7" fill="#999"/>
    </marker>
  </defs>

  <!-- Input x -->
  <rect x="330" y="45" width="100" height="34" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="380" y="67" text-anchor="middle" font-size="12" font-weight="bold" fill="#1d4ed8">input x</text>

  <!-- split point -->
  <line x1="380" y1="79" x2="380" y2="100" stroke="#666" stroke-width="1.5"/>
  <circle cx="380" cy="100" r="3" fill="#666"/>

  <!-- main path: goes down through the middle -->
  <line x1="380" y1="100" x2="380" y2="115" stroke="#666" stroke-width="1.5" marker-end="url(#rArrow)"/>

  <rect x="300" y="118" width="160" height="34" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="380" y="140" text-anchor="middle" font-size="11" fill="#991b1b">Conv 3x3 + BatchNorm</text>

  <line x1="380" y1="152" x2="380" y2="167" stroke="#666" stroke-width="1.5" marker-end="url(#rArrow)"/>

  <rect x="330" y="170" width="100" height="30" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="380" y="190" text-anchor="middle" font-size="11" fill="#92400e">ReLU</text>

  <line x1="380" y1="200" x2="380" y2="215" stroke="#666" stroke-width="1.5" marker-end="url(#rArrow)"/>

  <rect x="300" y="218" width="160" height="34" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="380" y="240" text-anchor="middle" font-size="11" fill="#991b1b">Conv 3x3 + BatchNorm</text>

  <text x="380" y="270" text-anchor="middle" font-size="10" fill="#666" font-style="italic">this whole path learns F(x)</text>

  <!-- shortcut path around the side -->
  <path d="M 380 100 C 620 100, 620 290, 460 290" fill="none" stroke="#059669" stroke-width="2.5" stroke-dasharray="6,4" marker-end="url(#rArrow)"/>
  <text x="600" y="90" text-anchor="middle" font-size="10.5" fill="#065f46" font-weight="bold">shortcut (identity)</text>
  <text x="600" y="103" text-anchor="middle" font-size="9.5" fill="#065f46">just passes x through, unchanged</text>

  <!-- main path continues to addition -->
  <line x1="380" y1="252" x2="380" y2="280" stroke="#666" stroke-width="1.5" marker-end="url(#rArrow)"/>

  <!-- Addition node -->
  <circle cx="420" cy="290" r="18" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="420" y="296" text-anchor="middle" font-size="16" font-weight="bold" fill="#5b21b6">+</text>
  <text x="420" y="322" text-anchor="middle" font-size="10" fill="#5b21b6">F(x) + x</text>

  <line x1="420" y1="308" x2="420" y2="325" stroke="#666" stroke-width="1.5" marker-end="url(#rArrow)"/>

  <!-- final relu -->
  <rect x="370" y="328" width="100" height="30" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="420" y="348" text-anchor="middle" font-size="11" fill="#92400e">ReLU</text>

  <text x="150" y="200" text-anchor="middle" font-size="10.5" fill="#666" width="180">If the two conv layers</text>
  <text x="150" y="216" text-anchor="middle" font-size="10.5" fill="#666">learn nothing useful,</text>
  <text x="150" y="232" text-anchor="middle" font-size="10.5" fill="#666">F(x) can settle near 0,</text>
  <text x="150" y="248" text-anchor="middle" font-size="10.5" fill="#666">and the block still passes</text>
  <text x="150" y="264" text-anchor="middle" font-size="10.5" fill="#666">x through untouched.</text>
  <text x="150" y="286" text-anchor="middle" font-size="10.5" fill="#666" font-weight="bold" fill-opacity="0.85">That's why depth stops hurting.</text>
</svg>

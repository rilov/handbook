<svg viewBox="0 0 900 300" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="900" height="300" fill="#f8f9fa" rx="12"/>
  <text x="450" y="24" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Transfer Learning — Reuse a Pretrained CNN, Replace the Head</text>

  <defs>
    <marker id="tArrow" markerWidth="8" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0,8 3.5,0 7" fill="#999"/>
    </marker>
    <pattern id="lockHatch" width="6" height="6" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#93c5fd" stroke-width="1.5"/>
    </pattern>
  </defs>

  <!-- Input image -->
  <rect x="15" y="110" width="80" height="60" rx="6" fill="#fff" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="55" y="145" text-anchor="middle" font-size="18">🐱</text>
  <text x="55" y="185" text-anchor="middle" font-size="9" fill="#666">your new photo</text>

  <line x1="95" y1="140" x2="118" y2="140" stroke="#aaa" stroke-width="1.5" marker-end="url(#tArrow)"/>

  <!-- Frozen feature extractor (pretrained, hatched to indicate frozen) -->
  <rect x="121" y="60" width="290" height="160" rx="10" fill="url(#lockHatch)" fill-opacity="0.25" stroke="#3b82f6" stroke-width="2"/>
  <rect x="121" y="60" width="290" height="30" rx="10" fill="#3b82f6"/>
  <text x="266" y="80" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#fff">Pretrained Feature Extractor</text>
  <text x="266" y="112" text-anchor="middle" font-size="10" fill="#1d4ed8">e.g. VGG16 / ResNet</text>
  <text x="266" y="128" text-anchor="middle" font-size="10" fill="#1d4ed8">trained earlier on millions</text>
  <text x="266" y="144" text-anchor="middle" font-size="10" fill="#1d4ed8">of photos (e.g. ImageNet)</text>
  <text x="266" y="168" text-anchor="middle" font-size="10.5" fill="#1e3a8a" font-weight="bold">🔒 weights frozen</text>
  <text x="266" y="184" text-anchor="middle" font-size="9" fill="#1d4ed8">(not updated during training)</text>
  <text x="266" y="202" text-anchor="middle" font-size="9" fill="#1d4ed8">still knows edges, textures, shapes</text>

  <line x1="411" y1="140" x2="436" y2="140" stroke="#aaa" stroke-width="1.5" marker-end="url(#tArrow)"/>

  <!-- feature vector -->
  <rect x="439" y="115" width="70" height="50" rx="6" fill="#f3f4f6" stroke="#6b7280" stroke-width="1.3"/>
  <text x="474" y="136" text-anchor="middle" font-size="9" fill="#374151">learned</text>
  <text x="474" y="150" text-anchor="middle" font-size="9" fill="#374151">features</text>

  <line x1="509" y1="140" x2="534" y2="140" stroke="#aaa" stroke-width="1.5" marker-end="url(#tArrow)"/>

  <!-- New trainable classifier head -->
  <rect x="537" y="60" width="230" height="160" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <rect x="537" y="60" width="230" height="30" rx="10" fill="#db2777"/>
  <text x="652" y="80" text-anchor="middle" font-size="11.5" font-weight="bold" fill="#fff">New Classifier Head</text>
  <text x="652" y="112" text-anchor="middle" font-size="10" fill="#9d174d">Dense layers you add</text>
  <text x="652" y="128" text-anchor="middle" font-size="10" fill="#9d174d">yourself, sized for</text>
  <text x="652" y="144" text-anchor="middle" font-size="10" fill="#9d174d">your own classes</text>
  <text x="652" y="168" text-anchor="middle" font-size="10.5" fill="#831843" font-weight="bold">🔓 fully trainable</text>
  <text x="652" y="184" text-anchor="middle" font-size="9" fill="#9d174d">(this is what actually learns</text>
  <text x="652" y="198" text-anchor="middle" font-size="9" fill="#9d174d">"cat vs dog" from your data)</text>

  <line x1="767" y1="140" x2="792" y2="140" stroke="#aaa" stroke-width="1.5" marker-end="url(#tArrow)"/>

  <rect x="795" y="115" width="90" height="50" rx="6" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="840" y="136" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#065f46">"Cat!"</text>
  <text x="840" y="150" text-anchor="middle" font-size="8" fill="#065f46">96% confident</text>

  <text x="450" y="255" text-anchor="middle" font-size="10" fill="#666">Freezing the pretrained body means you only need a small amount of your own labeled data</text>
  <text x="450" y="272" text-anchor="middle" font-size="10" fill="#666">to train a new classifier on top of features someone else already spent days of compute learning</text>
</svg>

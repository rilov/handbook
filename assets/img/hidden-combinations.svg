<svg viewBox="0 0 780 340" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <rect width="780" height="340" fill="#f8f9fa" rx="12"/>
  <text x="390" y="26" text-anchor="middle" font-size="14" font-weight="bold" fill="#222">Hidden Neurons Learn Combinations — Each Looks for Something Different</text>
  <defs>
    <marker id="ahc" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0,7 3,0 6" fill="#aaa"/>
    </marker>
    <marker id="ahc2" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0,7 3,0 6" fill="#7c3aed"/>
    </marker>
    <marker id="ahc3" markerWidth="7" markerHeight="6" refX="5" refY="3" orient="auto">
      <polygon points="0 0,7 3,0 6" fill="#059669"/>
    </marker>
  </defs>

  <!-- INPUT FEATURES (left column) -->
  <text x="90" y="52" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Inputs</text>

  <rect x="20" y="60" width="140" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="79" text-anchor="middle" font-size="11" fill="#1d4ed8">suspicious_words = 3</text>

  <rect x="20" y="100" width="140" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="119" text-anchor="middle" font-size="11" fill="#1d4ed8">links = 1</text>

  <rect x="20" y="140" width="140" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="159" text-anchor="middle" font-size="11" fill="#1d4ed8">unknown_sender = 1</text>

  <rect x="20" y="180" width="140" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="199" text-anchor="middle" font-size="11" fill="#1d4ed8">capitals = 0.20</text>

  <rect x="20" y="220" width="140" height="28" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="90" y="239" text-anchor="middle" font-size="11" fill="#1d4ed8">length = 47</text>

  <!-- HIDDEN NEURONS (middle) -->
  <text x="390" y="52" text-anchor="middle" font-size="11" font-weight="bold" fill="#7c3aed">Hidden Neurons</text>

  <!-- Neuron 1: links + unknown_sender -->
  <ellipse cx="390" cy="110" rx="110" ry="38" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <text x="390" y="102" text-anchor="middle" font-size="10" font-weight="bold" fill="#5b21b6">Neuron 1 — spots risky sender</text>
  <text x="390" y="117" text-anchor="middle" font-size="10" fill="#6d28d9">links × 0.7 + unknown_sender × 1.5</text>
  <text x="390" y="130" text-anchor="middle" font-size="9" fill="#7c3aed">→ fires: many links + unknown sender</text>

  <!-- Neuron 2: suspicious_words + capitals -->
  <ellipse cx="390" cy="210" rx="110" ry="38" fill="#fce7f3" stroke="#db2777" stroke-width="2"/>
  <text x="390" y="202" text-anchor="middle" font-size="10" font-weight="bold" fill="#9d174d">Neuron 2 — spots spam language</text>
  <text x="390" y="217" text-anchor="middle" font-size="10" fill="#be185d">suspicious_words × 1.1 + capitals × 0.9</text>
  <text x="390" y="230" text-anchor="middle" font-size="9" fill="#db2777">→ fires: lots of CAPS + spam words</text>

  <!-- Neuron 3: known_sender + long message -->
  <ellipse cx="390" cy="305" rx="110" ry="28" fill="#d1fae5" stroke="#059669" stroke-width="2"/>
  <text x="390" y="299" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">Neuron 3 — spots normal mail</text>
  <text x="390" y="313" text-anchor="middle" font-size="10" fill="#047857">known_sender × 1.2 + length × 0.02</text>

  <!-- Wires input→neuron 1 (links, unknown_sender highlighted) -->
  <line x1="160" y1="114" x2="278" y2="110" stroke="#7c3aed" stroke-width="2" marker-end="url(#ahc2)"/>
  <line x1="160" y1="154" x2="278" y2="114" stroke="#7c3aed" stroke-width="2" marker-end="url(#ahc2)"/>
  <!-- faint lines to neuron1 -->
  <line x1="160" y1="74" x2="278" y2="100" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="160" y1="194" x2="278" y2="116" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="160" y1="234" x2="278" y2="118" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Wires input→neuron 2 (suspicious_words, capitals highlighted) -->
  <line x1="160" y1="74" x2="278" y2="202" stroke="#db2777" stroke-width="2" marker-end="url(#ahc)"/>
  <line x1="160" y1="194" x2="278" y2="210" stroke="#db2777" stroke-width="2" marker-end="url(#ahc)"/>
  <!-- faint -->
  <line x1="160" y1="114" x2="278" y2="204" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="160" y1="154" x2="278" y2="206" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="160" y1="234" x2="278" y2="212" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Wires input→neuron 3 (faint, normal email) -->
  <line x1="160" y1="154" x2="278" y2="300" stroke="#059669" stroke-width="2" marker-end="url(#ahc3)"/>
  <line x1="160" y1="234" x2="278" y2="305" stroke="#059669" stroke-width="2" marker-end="url(#ahc3)"/>
  <line x1="160" y1="74" x2="278" y2="298" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="160" y1="114" x2="278" y2="300" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="160" y1="194" x2="278" y2="302" stroke="#cbd5e1" stroke-width="1"/>

  <!-- OUTPUT NEURON -->
  <text x="680" y="52" text-anchor="middle" font-size="11" font-weight="bold" fill="#059669">Output</text>
  <ellipse cx="680" cy="200" rx="80" ry="46" fill="#d1fae5" stroke="#059669" stroke-width="2.5"/>
  <text x="680" y="186" text-anchor="middle" font-size="10" font-weight="bold" fill="#065f46">Output Neuron</text>
  <text x="680" y="200" text-anchor="middle" font-size="10" fill="#047857">neuron_1 × 0.8</text>
  <text x="680" y="214" text-anchor="middle" font-size="10" fill="#047857">+ neuron_2 × 0.6</text>
  <text x="680" y="228" text-anchor="middle" font-size="11" fill="#065f46" font-weight="bold">→ 0.946 Spam</text>

  <!-- Wires hidden→output -->
  <line x1="500" y1="110" x2="598" y2="185" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#ahc)"/>
  <line x1="500" y1="210" x2="598" y2="200" stroke="#db2777" stroke-width="1.5" marker-end="url(#ahc)"/>
  <line x1="500" y1="305" x2="598" y2="215" stroke="#059669" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#ahc)"/>

  <!-- Weight labels on output wires -->
  <text x="548" y="142" font-size="10" fill="#7c3aed">×0.8</text>
  <text x="555" y="202" font-size="10" fill="#db2777">×0.6</text>
</svg>